---
argument_specs:
  main:
    short_description: Install the Linphone SIP softphone client
    description:
      - Installs the Linphone SIP softphone client on Debian-family hosts and holds the package at its installed version.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      softphone_packages:
        type: list
        elements: str
        description: Softphone package(s) to install via apt. Defaults to linphone (linphone-cli on Debian 13+, which dropped the GUI package).
