---
- name: "Block to Allow Loading of Variables without running task"
  when: run_tasks
  block:
    - name: "Installing Required SikuliX Dependencies -- Takes about 5 Mins"
      ansible.builtin.apt:
        name: "{{ packages }}"
      vars:
        packages:
          - g++
          - autoconf
          - libglib2.0-dev
          - automake
          - libtool
          - autoconf-archive
          - libcanberra-gtk0
          - libcanberra-gtk-module
          - libopencv4.5-java
          - pkg-config
          - libcairo2-dev
          - libpango1.0-dev
          - libicu-dev
          - zlib1g-dev
          - libtiff5-dev
          - libjpeg8-dev
          - python3-unittest2
          - python3-psutil
          - xvfb
          - preload
          - leptonica-progs
          - tesseract-ocr
          - dos2unix
    - name: "Copying OpenCV Binaries to Java Working Directory"
      ansible.builtin.find:
        paths: /usr/lib/jni
        patterns: libopencv_java*.so
        recurse: true
      register: file_to_copy
    - name: "Adding OpenCV to Bin"
      ansible.builtin.file:
        dest: /usr/lib/libopencv_java.so
        src: "{{ item.path }}"
        state: link
      with_items: "{{ file_to_copy.files }}"
    - name: "Creating Directory for Sikulix Jars"
      ansible.builtin.file:
        group: "{{ vagrant_user }}"
        mode: "u=rwX,g=rX,o=rX"
        owner: "{{ vagrant_user }}"
        path: /jars
        state: directory
    - name: "Creating directory for Sikulix Extensions"
      ansible.builtin.file:
        group: "{{ vagrant_user }}"
        mode: "u=rwX,g=rX,o=rX"
        owner: "{{ vagrant_user }}"
        path: "/home/{{ vagrant_user }}/.Sikulix/Extensions/"
        state: directory
    - name: "Creating Directory for Sikulix Extensions"
      ansible.builtin.file:
        group: "{{ vagrant_user }}"
        mode: "u=rwX,g=rX,o=rX"
        owner: "{{ vagrant_user }}"
        path: "/home/{{ vagrant_user }}/.Sikulix/SikulixStore/"
        state: directory
    - name: "Downloading jruby sources for {{ vagrant_user }}"
      delay: 5
      ansible.builtin.get_url:
        dest: "/home/{{ vagrant_user }}/.Sikulix/Extensions/jruby-complete-{{ jruby_version }}.jar"
        url: "https://repo1.maven.org/maven2/org/jruby/jruby-complete/{{ jruby_version }}/jruby-complete-{{ jruby_version }}.jar"
        mode: "0644"
      register: jruby_source_vagrant
      retries: 5
      until: "jruby_source_vagrant is success"
    - name: "Downloading jython sources for {{ vagrant_user }}"
      delay: 5
      ansible.builtin.get_url:
        dest: "/home/{{ vagrant_user }}/.Sikulix/Extensions/jython-standalone-{{ jython_version }}.jar"
        url: "https://repo1.maven.org/maven2/org/python/jython-standalone/{{ jython_version }}/jython-standalone-{{ jython_version }}.jar"
        mode: "0644"
      register: jython_source_vagrant
      retries: 5
      until: "jython_source_vagrant is success"
    - name: "Downloading SikulixJarAPI sources"
      delay: 5
      ansible.builtin.get_url:
        dest: /jars/sikulixapi.jar
        url: "{{ sikulixapi_download_url }}{{ sikulixapi_jar }}"
        mode: "0644"
      register: sikulixjarapi_source
      retries: 5
      until: "sikulixjarapi_source is success"
    - name: "Downloading SikulixJar sources"
      delay: 5
      ansible.builtin.get_url:
        dest: /jars/sikulix.jar
        url: "{{ sikulix_download_url }}{{ sikulix_jar }}"
        mode: "0644"
      register: sikulixjar_source
      retries: 5
      until: "sikulixjar_source is success"
    ### Desktop Icons
    - name: "Creating Menu Icons for All Users"
      become: true
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: "0755"
      with_items:
        - { src: Sikuli.desktop, dest: "/usr/share/applications/Sikulix.desktop" }
    - name: "Creating Menu Icons for All Users moving Image"
      become: true
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: "0777"
      with_items:
        - { src: Sikuli.png, dest: "/usr/share/applications/Sikuli.png" }
    - name: "Adding Scripts to Desktop"
      become: true
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: "{{ vagrant_user }}"
        group: "{{ vagrant_user }}"
        mode: "0755"
        remote_src: true
      with_items:
        - { src: /vagrant/scripts, dest: "/home/{{ vagrant_user }}/Desktop" }
    - name: "Ensuring that Desktop Icons are Launchable"
      ansible.builtin.command: "dbus-launch gio set {{ item }}  \"metadata::trusted\" true"
      changed_when: false
      with_items:
        - /usr/share/applications/Sikulix.desktop
    - name: "Changing perm of Jar files"
      ansible.builtin.file:
        group: "{{ vagrant_user }}"
        mode: "u=wrX,g=rX,o=rX"
        owner: "{{ vagrant_user }}"
        path: /jars
        recurse: true
