---
argument_specs:
  main:
    short_description: Configure system-wide proxy settings
    description:
      - Configures system-wide HTTP/HTTPS proxy environment variables and package-manager proxy settings (APT, yum, WinHTTP) on Debian, RedHat, and Windows guests.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      proxy_systemwide:
        type: bool
        default: true
        description: Whether to write the system-wide proxy environment variables into /etc/environment.
      proxy_systemwide_proxy:
        type: str
        default: squid
        description: Key of the proxy entry (from proxy) to use for the system-wide environment variable configuration.
      proxy:
        type: list
        elements: dict
        description: >-
          List of proxy definitions, each a single-key dict whose key names the
          proxy (for example dante or squid) and whose value holds the
          connection details (user, pass, host, port).
