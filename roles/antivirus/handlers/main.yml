---
- name: "Running freshclam after ClamAV packages change"
  ansible.builtin.command: freshclam
  register: freshclam_result
  changed_when: true
  notify: "Restarting clamav daemon"
  # On Debian, freshclam is automatically run post-install, so this may fail.
  failed_when:
    - freshclam_result is failed
    - freshclam_result.stderr.find('locked by another process') == -1

- name: "Restarting clamav daemon"
  ansible.builtin.service:
    name: "{{ clamav_daemon }}"
    state: restarted
  when: clamav_daemon_state != 'stopped'

- name: "Reloading systemd"
  ansible.builtin.systemd:
    state: stopped
    daemon_reload: true
    name: "{{ clamav_freshclam_daemon }}"
