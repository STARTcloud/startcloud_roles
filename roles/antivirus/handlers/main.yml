---
- name: "Running freshclam after ClamAV packages change"
  ansible.builtin.command: freshclam
  register: freshclam_result
  changed_when: true
  notify: "Restarting clamav daemon"
  # On Debian the clamav-freshclam daemon autostarts on install and holds the
  # log lock, so a manual freshclam run may lose the race; tolerate only that.
  failed_when:
    - freshclam_result is failed
    - "'locked by another process' not in freshclam_result.stderr"
    - "'Failed to lock the log file' not in freshclam_result.stdout"

- name: "Restarting clamav daemon"
  ansible.builtin.service:
    name: "{{ clamav_daemon }}"
    state: restarted
  when: clamav_daemon_state != 'stopped'

- name: "Reloading systemd"
  ansible.builtin.systemd:
    state: stopped
    daemon_reload: true
    name: "{{ clamav_freshclam_daemon }}"
