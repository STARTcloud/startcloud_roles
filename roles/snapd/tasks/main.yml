---
-
  name: "Block to Allow Loading of Variables without running task"
  when: run_tasks
  block:
    -
      name: "Running Only for Debian-Based Distributions"
      when:
        - ansible_os_family | lower != "debian"
      block:
        -
          name: "Notifying Unsupported Distribution"
          ansible.builtin.debug:
            msg: "This role only works with Debian-based distributions."

        -
          name: "Ending Host Execution on Unsupported Distribution"
          ansible.builtin.meta: end_host

    -
      name: "Merging Snapd Configuration Between Defaults and Custom"
      ansible.builtin.set_fact:
        snapd_services: "{{ snapd_defaults_services | union(snapd_services) | unique }}"
        snapd_files: "{{ snapd_defaults_files | union(snapd_files) | unique }}"
        snapd_block_packages: "{{ snapd_defaults_block_packages | union(snapd_block_packages) | unique }}"

    -
      name: "Shutting Down Services, Sockets and Timers"
      ansible.builtin.service:
        name: "{{ item }}"
        state: "{{ snapd_state }}"
        enabled: "{{ snapd_enabled }}"
      failed_when: false
      loop: "{{ snapd_services }}"
      loop_control:
        label: "{{ item }}"

    -
      name: "Purging Snapd Packages and Files"
      when:
        - snapd_purge
      block:
        -
          name: "Removing Snapd Packages"
          ansible.builtin.package:
            name: "{{ snapd_block_packages }}"
            state: absent
            purge: true

        -
          name: "Blocking Installation"
          when:
            - snapd_block_packages is defined
            - snapd_block_packages | count > 0
          block:
            -
              name: "Blocking Later Installations of Snapd"
              ansible.builtin.template:
                src: apt/preferences.d/snapd.pref.j2
                dest: /etc/apt/preferences.d/snapd.pref
                mode: "0644"
              notify:
                - clean apt cache
                - update package cache
              when:
                - snapd_block_later_installation

        -
          name: "Removing Snapd-Related Directories"
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop: "{{ snapd_files }}"
          loop_control:
            label: "{{ item }}"

    -
      name: "Flushing Handlers"
      ansible.builtin.meta: flush_handlers
...
