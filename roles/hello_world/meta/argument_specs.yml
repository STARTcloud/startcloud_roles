---
argument_specs:
  main:
    short_description: Print a hello_world debug message
    description:
      - A minimal example role that prints a debug message containing the
        hello_world variable supplied from Hosts.yml.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
