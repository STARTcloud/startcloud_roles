---
-
  name: "Block to Allow Loading of Variables without running task"
  when: run_tasks
  block:
    -
      name: "Enabling Remote Desktop"
      when: enable_rdp
      ansible.windows.win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server
        name: fDenyTSConnections
        data: 0
        type: dword

    -
      name: "Gathering Windows Facts"
      ansible.windows.setup:

    -
      name: "Installing OpenSSH Server"
      when: enable_openssh
      block:
        -
          name: "Creating InstallOpenSSHServer.ps1"
          ansible.windows.win_copy:
            dest: "{{ openssh_install_script_path }}"
            content: |
              Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0
              Add-WindowsCapability -Online -Name OpenSSH.Client~~~~0.0.1.0

        -
          name: "Creating scheduled task to install OpenSSH Server"
          community.windows.win_scheduled_task:
            name: InstallOpenSSHServerTask
            description: Install OpenSSH Server
            actions:
              - path: C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe
                arguments: -ExecutionPolicy Bypass -File {{ openssh_install_script_path }}
            triggers:
              - type: registration
            username: SYSTEM
            state: present
            enabled: true

        -
          name: "Executing the scheduled task"
          ansible.windows.win_shell: schtasks /Run /TN "InstallOpenSSHServerTask"

        -
          name: "Waiting for the scheduled task to complete"
          ansible.windows.win_shell: |
            $task = Get-ScheduledTask -TaskName "InstallOpenSSHServerTask"
            while ($task.State -eq "Running") {
              Start-Sleep -Seconds 5
              $task = Get-ScheduledTask -TaskName "InstallOpenSSHServerTask"
            }

        -
          name: "Checking if task completed successfully"
          ansible.windows.win_shell: |
            $task = Get-ScheduledTask -TaskName "InstallOpenSSHServerTask"
            while ($task.State -eq "Running") {
              Start-Sleep -Seconds 5
              $task = Get-ScheduledTask -TaskName "InstallOpenSSHServerTask"
            }
            if ($task.LastTaskResult -eq 0) {
              $completedSuccessfully = $true
            } else {
              $completedSuccessfully = $false
            }
            $completedSuccessfully
          register: task_result

        -
          name: "Deleting the scheduled task if it completed successfully"
          community.windows.win_scheduled_task:
            name: InstallOpenSSHServerTask
            state: absent
          when: task_result.stdout == "True"

        -
          name: "Starting and Setting the SSHD Service to Automatic"
          ansible.windows.win_service:
            name: sshd
            state: started
            start_mode: auto

        -
          name: "Waiting for file C:\\ProgramData\\ssh\\sshd_config to exist before continuing"
          ansible.windows.win_wait_for:
            path: C:\ProgramData\ssh\sshd_config
            timeout: 1800

    -
      name: "Applying Server-specific Configurations"
      when: ansible_os_family == "Windows" and "server" in ansible_distribution.lower()
      block:
        -
          name: "Disabling Server Manager on Login"
          ansible.windows.win_regedit:
            path: HKCU:\Software\Microsoft\ServerManager
            name: DoNotOpenServerManagerAtLogon
            data: 1
            type: dword

        -
          name: "Removing unwanted features (tolerated if not present on this edition/media)"
          ansible.windows.win_feature:
            name: "{{ item }}"
            state: absent
          loop: "{{ remote_access_features_to_remove | default(['AzureArcSetup']) }}"
          register: feature_removal
          failed_when:
            - feature_removal is failed
            - "'not valid' not in (feature_removal.msg | default(''))"
            - "'not found' not in (feature_removal.msg | default(''))"

        -
          name: "Removing Azure Arc Setup capability (Server 2025+ Feature on Demand)"
          ansible.windows.win_shell: |
            $caps = Get-WindowsCapability -Online | Where-Object { $_.Name -like 'AzureArcSetup*' -and $_.State -eq 'Installed' }
            if ($caps) {
              foreach ($c in $caps) { Remove-WindowsCapability -Online -Name $c.Name | Out-Null }
              Write-Output ("Removed: " + (($caps | ForEach-Object Name) -join ', '))
            } else {
              Write-Output 'AzureArcSetup capability not present'
            }
          register: arc_capability_removal
          changed_when: "'Removed:' in arc_capability_removal.stdout"

        -
          name: "Enabling NFS Client"
          ansible.windows.win_feature:
            name: "NFS-Client"
            state: present

        -
          name: "Enabling Telnet Client"
          ansible.windows.win_feature:
            name: "Telnet-Client"
            state: present

