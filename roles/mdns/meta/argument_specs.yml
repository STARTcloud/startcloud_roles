---
argument_specs:
  main:
    short_description: Avahi mDNS daemon
    description:
      - Installs and enables the Avahi mDNS/zeroconf daemon on Debian for .local name resolution.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      packages:
        type: list
        elements: str
        description: Packages associated with the role (avahi-daemon).
