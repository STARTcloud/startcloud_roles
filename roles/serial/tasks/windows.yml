---
- name: "Enabling Windows Emergency Management Services (EMS) and Serial Console capability"
  ansible.windows.win_shell: |
    DISM /Online /Add-Capability /CapabilityName:Windows.Desktop.EMS-SAC.Tools~~~~0.0.1.0
  register: ems_sac_result
  ignore_errors: true
  when: ansible_distribution == "Microsoft Windows 10 Enterprise" or ansible_distribution == "Microsoft Windows 10 Pro"

- name: "Enabling Serial Emergency Management Console"
  ansible.windows.win_shell: |
    bcdedit /ems ON
    bcdedit /bootems ON
    bcdedit /emssettings EMSPORT:1 EMSBAUDRATE:115200

- name: "Preventing SAC command-channel logins from loading a user profile"
  # The SAC (serial console) cmd channel loads the user profile by default. When a tool
  # logs in over SAC during early boot/OOBE (e.g. vagrant-zones), that premature profile
  # load races OOBE's own Administrator profile creation and strands the account in a
  # temporary profile (C:\Users\TEMP). This setting (a SacSvr-service parameter, scoped
  # ONLY to SAC cmd sessions) makes SAC authenticate without loading a profile, so the
  # normal AutoLogon/RDP/console logins still build the real profile. See MS EMS docs.
  ansible.windows.win_regedit:
    path: HKLM:\System\CurrentControlSet\Services\SacSvr\Parameters
    name: LoadProfilesDisabled
    data: 1
    type: dword
    state: present
