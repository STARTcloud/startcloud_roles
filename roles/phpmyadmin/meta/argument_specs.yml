---
argument_specs:
  main:
    short_description: Install and configure phpMyAdmin behind nginx
    description:
      - Downloads and extracts phpMyAdmin, seeds its config.inc.php, generates a unique blowfish secret, and installs an nginx location for it.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      python_simple_web_server_path:
        type: str
        default: "{{ service_home_dir }}"
        description: Filesystem path used as the document root for the simple web server.
      startcloud_quick_start_port_forwards:
        type: list
        elements: dict
        description: Guest port forwards advertised for the quick-start demo entry point.
      startcloud_quick_start_proxy_url:
        type: str
        description: Fully qualified proxy URL derived from the first quick-start port forward.
