---
argument_specs:
  main:
    short_description: Install and configure phpMyAdmin behind nginx
    description:
      - Downloads and extracts phpMyAdmin, seeds its config.inc.php, generates a unique blowfish secret, and installs an nginx location for it.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      phpmyadmin_version:
        type: str
        default: "5.2.2"
        description: phpMyAdmin release to download and install.
      phpmyadmin_download_url:
        type: str
        description: Full URL of the phpMyAdmin all-languages tarball; derived from phpmyadmin_version by default.
      phpmyadmin_install_dir:
        type: str
        default: /usr/share/phpmyadmin
        description: Directory phpMyAdmin is extracted into and served from.
      phpmyadmin_php_fpm_socket:
        type: str
        description: php-fpm socket the nginx location proxies PHP requests to. Defaults to the php_version fpm socket (8.4 when php_version is unset).
