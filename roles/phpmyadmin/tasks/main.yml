---
- name: "Block to Allow Loading of Variables without running task"
  when: run_tasks
  block:
    - name: "Creating {{ phpmyadmin_install_dir }}"
      ansible.builtin.file:
        dest: "{{ phpmyadmin_install_dir }}"
        group: www-data
        owner: www-data
        state: directory
        mode: "0755"

    - name: "Extracting phpMyAdmin {{ phpmyadmin_version }}"
      become: true
      ansible.builtin.unarchive:
        src: "{{ phpmyadmin_download_url }}"
        dest: "{{ phpmyadmin_install_dir }}"
        remote_src: true
        extra_opts:
          - --strip-components=1
        creates: "{{ phpmyadmin_install_dir }}/index.php"

    - name: "Checking if config.inc.php Exists"
      changed_when: false
      register: config_inc
      ansible.builtin.stat:
        path: "{{ phpmyadmin_install_dir }}/config.inc.php"

    - name: "Checking if config.sample.inc.php Exists"
      changed_when: false
      register: config_inc_sample
      ansible.builtin.stat:
        path: "{{ phpmyadmin_install_dir }}/config.sample.inc.php"

    - name: "Setting up PHP configuration"
      become: true
      ansible.builtin.command: "cp config.sample.inc.php config.inc.php"
      changed_when: true
      when: not config_inc.stat.exists and config_inc_sample.stat.exists
      args:
        chdir: "{{ phpmyadmin_install_dir }}"

    - name: "Checking if nginx is installed"
      changed_when: false
      register: nginx_conf_dir
      ansible.builtin.stat:
        path: /etc/nginx/conf.d

    - name: "Ensuring directory for global nginx configuration files exists"
      ansible.builtin.file:
        path: /etc/nginx/global.d
        state: directory
        mode: "0755"
      when: nginx_conf_dir.stat.exists

    - name: "Ensuring phpmyadmin configuration for nginx is installed"
      notify: "Restarting nginx"
      ansible.builtin.template:
        dest: /etc/nginx/global.d/phpmyadmin.conf
        src: nginx.conf.j2
        mode: "0644"
      when: nginx_conf_dir.stat.exists

    - name: "Generating Unique Key"
      ansible.builtin.set_fact:
        my_pass: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters') }}"

    - name: "Checking whether the blowfish secret is still empty"
      ansible.builtin.command:
        argv:
          - grep
          - -F
          - "$cfg['blowfish_secret'] = '';"
          - "{{ phpmyadmin_install_dir }}/config.inc.php"
      register: phpmyadmin_blowfish_empty
      changed_when: false
      failed_when: phpmyadmin_blowfish_empty.rc not in [0, 1]

    - name: "Setting Unique Key"
      ansible.builtin.lineinfile:
        dest: "{{ phpmyadmin_install_dir }}/config.inc.php"
        line: "$cfg['blowfish_secret'] = '{{ my_pass }}';"
        regexp: "^\\$cfg\\['blowfish_secret'\\] = '';"
      when: phpmyadmin_blowfish_empty.rc == 0
