---
run_tasks: true

phpmyadmin_version: "5.2.2"
phpmyadmin_download_url: "https://files.phpmyadmin.net/phpMyAdmin/{{ phpmyadmin_version }}/phpMyAdmin-{{ phpmyadmin_version }}-all-languages.tar.gz"
phpmyadmin_install_dir: /usr/share/phpmyadmin

## php-fpm socket the nginx location proxies to
phpmyadmin_php_fpm_socket: "unix:/var/run/php/php{{ php_version | default('8.4') }}-fpm.sock"
