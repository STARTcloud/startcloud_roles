galaxy_info:
  role_name: influxdb
  author: Mark Gilbert
  description: Installs and configures a single-node InfluxDB 2.x time-series database from the InfluxData repository on Debian, Ubuntu, and Enterprise Linux.
  company: STARTcloud
  issue_tracker_url: https://github.com/STARTcloud/startcloud_roles/issues
  license: Apache-2.0
  min_ansible_version: '2.15'
  platforms:
    - name: Debian
      versions: ['bookworm', 'trixie']
    - name: Ubuntu
      versions: ['jammy', 'noble']
    - name: EL
      versions: ['8', '9']
  galaxy_tags:
    - influxdb
    - tsdb
    - monitoring
    - database
dependencies: []
collections:
  - startcloud.startcloud_roles
