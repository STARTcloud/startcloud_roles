---
- name: "Including OS-specific vars"
  ansible.builtin.include_vars: "{{ ansible_os_family | lower }}.yml"

- name: "Updating yum cache"
  become: true
  ansible.builtin.dnf:
    update_cache: true

- name: "Upgrading all yum packages"
  become: true
  ansible.builtin.dnf:
    name: "*"
    state: latest # noqa package-latest

- name: "Installing EPEL repo"
  become: true
  ansible.builtin.dnf:
    name: epel-release
    state: present

- name: "Ensuring EPEL repo is enabled"
  become: true
  community.general.ini_file:
    path: /etc/yum.repos.d/epel.repo
    section: epel
    option: enabled
    value: "1"

- name: "Installing utilities to enable package repositories"
  become: true
  ansible.builtin.package:
    name: yum-utils
    state: latest

- name: "Updating yum cache"
  ansible.builtin.dnf:
    update_cache: true

- name: "Installing packages"
  ansible.builtin.dnf:
    name: "{{ packages }}"
    state: present
