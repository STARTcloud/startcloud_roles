---
-
  name: "Including OS-specific vars"
  ansible.builtin.include_vars: "{{ ansible_os_family | lower }}.yml"

-
  name: "Create pkg proxy configuration: /usr/local/etc/pkg/repos/proxy.conf"
  ansible.builtin.template:
    src: pkg_proxy.conf.j2
    dest: /usr/local/etc/pkg/repos/proxy.conf
    mode: '0644'
  when: use_proxy | bool

-
  name: "Self-upgrade pkg before installing other packages (pkg mid-install self-upgrades can abort subsequent work)"
  community.general.pkgng:
    name: pkg
    state: latest
  register: pkg_self_upgrade
  until: pkg_self_upgrade is succeeded
  retries: 5
  delay: 10

-
  name: "Installing baseline packages"
  community.general.pkgng:
    name: "{{ packages }}"
    state: present
  register: pkg_baseline
  until: pkg_baseline is succeeded
  retries: 5
  delay: 10

-
  name: "Installing extra packages"
  community.general.pkgng:
    name: "{{ extra_packages }}"
    state: present
  register: pkg_extra
  until: pkg_extra is succeeded
  retries: 5
  delay: 10
  when: extra_packages | default([]) | length > 0

-
  name: "Enable qemu-guest-agent service (if os-qemu-guest-agent was installed)"
  ansible.builtin.service:
    name: qemu-guest-agent
    enabled: true
  when: "'os-qemu-guest-agent' in packages"

-
  name: "Start qemu-guest-agent service (may already be started by plugin post-install hook)"
  ansible.builtin.service:
    name: qemu-guest-agent
    state: started
  when: "'os-qemu-guest-agent' in packages"
  ignore_errors: true
