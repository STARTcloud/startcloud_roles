---
- name: "Block to Allow Loading of Variables without running task"
  when: run_tasks
  block:
    - name: "Including setup-RedHat.yml {{ elasticsearch_version }}"
      ansible.builtin.include_tasks: setup-RedHat.yml
      when: ansible_os_family == 'RedHat'

    - name: "Including setup-Debian.yml {{ elasticsearch_version }}"
      ansible.builtin.include_tasks: setup-Debian.yml
      when: ansible_os_family == 'Debian'

    - name: "Installing Elasticsearch {{ elasticsearch_version }}"
      ansible.builtin.package:
        name: "{{ elasticsearch_package }}"
        state: "{{ elasticsearch_package_state }}"

    - name: "Configuring Elasticsearch 6 or below {{ elasticsearch_version }}"
      ansible.builtin.template:
        src: "{{ item | basename }}.j2"
        dest: "{{ item }}"
        owner: root
        group: elasticsearch
        mode: "0660"
      with_items:
        - /etc/elasticsearch/elasticsearch.yml
        - /etc/elasticsearch/jvm.options
      notify: Restarting Elasticsearch
      when: elasticsearch_version[0] | int < 7

    - name: "Configuring Elasticsearch 7 and above {{ elasticsearch_version }}"
      ansible.builtin.template:
        src: "{{ item | basename }}.j2"
        dest: "{{ item }}"
        owner: root
        group: elasticsearch
        mode: "0660"
      with_items:
        - /etc/elasticsearch/elasticsearch.yml
        - /etc/elasticsearch/jvm.options.d/heap.options
      notify: Restarting Elasticsearch
      when: elasticsearch_version[0] | int >= 7

    - name: "Flushing handlers to apply configuration changes"
      ansible.builtin.meta: flush_handlers

    - name: "Starting Elasticsearch"
      ansible.builtin.service:
        name: elasticsearch
        state: "{{ elasticsearch_service_state }}"
        enabled: "{{ elasticsearch_service_enabled }}"

    - name: "Waiting for Elasticsearch to be reachable"
      ansible.builtin.wait_for:
        host: "{{ elasticsearch_network_host }}"
        port: "{{ elasticsearch_http_port }}"
        delay: 3
        timeout: 300
