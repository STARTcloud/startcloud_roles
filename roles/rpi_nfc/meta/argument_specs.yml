---
argument_specs:
  main:
    short_description: Install libnfc and the nfc-daemon service
    description:
      - Installs the libnfc packages, renders the libnfc configuration, clones
        and builds the nfc-daemon source, installs it, and registers the
        nfc-daemon systemd service for NFC reader support on Raspberry Pi.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
