---
- name: "Block to Allow Loading of Variables without running task"
  when: run_tasks
  block:
    - name: "Creating the Greenbone installation directory"
      ansible.builtin.file:
        path: "{{ greenbone_install_dir }}"
        state: directory
        mode: "0755"

    - name: "Rendering the Greenbone Community Containers compose file"
      ansible.builtin.template:
        src: "docker-compose.yml.j2"
        dest: "{{ greenbone_install_dir }}/docker-compose.yml"
        mode: "0644"

    - name: "Deploying the Greenbone Community Edition stack"
      community.docker.docker_compose_v2:
        project_src: "{{ greenbone_install_dir }}"
        project_name: "{{ greenbone_project_name }}"
        state: "{{ greenbone_compose_state }}"
        pull: "{{ greenbone_compose_pull }}"

    ## gvmd's first boot spends 15-30 minutes loading the SCAP/CERT feeds
    ## into postgres before it can service CLI requests, so the administrator
    ## account is created by a self-disabling systemd timer instead of
    ## blocking the provision run. Outcome is logged to admin-setup.log.
    - name: "Recording the Greenbone administrator credentials"
      ansible.builtin.copy:
        content: |
          username: {{ greenbone_admin_user }}
          password: {{ greenbone_admin_password }}
        dest: "{{ greenbone_install_dir }}/admin-credentials"
        mode: "0600"
      no_log: true

    - name: "Installing the Greenbone administrator creation script"
      ansible.builtin.template:
        src: greenbone-admin.sh.j2
        dest: "{{ greenbone_install_dir }}/greenbone-admin.sh"
        mode: "0700"
      no_log: true

    - name: "Installing the Greenbone administrator creation service"
      ansible.builtin.template:
        src: greenbone-admin.service.j2
        dest: /etc/systemd/system/greenbone-admin.service
        mode: "0644"

    - name: "Enabling the Greenbone administrator creation timer"
      ansible.builtin.template:
        src: greenbone-admin.timer.j2
        dest: /etc/systemd/system/greenbone-admin.timer
        mode: "0644"

    - name: "Starting the Greenbone administrator creation timer"
      ansible.builtin.systemd:
        name: greenbone-admin.timer
        enabled: true
        state: started
        daemon_reload: true
