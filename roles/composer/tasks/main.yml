---
- name: "Block to Allow Loading of Variables without running task"
  when: run_tasks
  block:
    - name: "Checking Requested Version Parameters Are Valid"
      ansible.builtin.fail:
        msg: >-
          You cannot request a specific version AND keep the composer up to date.
          Set either composer_version or composer_keep_updated, but not both.
      when: composer_version != '' and composer_keep_updated

    - name: "Setting php_executable Variable to a Default if Not Defined"
      ansible.builtin.set_fact:
        php_executable: php
      when: php_executable is not defined

    - name: "Checking if Composer Is Installed"
      ansible.builtin.stat: "path={{ composer_path }}"
      register: composer_bin

    - name: "Getting Composer Installer Signature"
      ansible.builtin.uri:
        url: https://composer.github.io/installer.sig
        return_content: true
      register: composer_installer_signature
      when: not composer_bin.stat.exists

    - name: "Downloading Composer Installer"
      ansible.builtin.get_url:
        url: https://getcomposer.org/installer
        dest: /tmp/composer-installer.php
        mode: "0755"
        checksum: "sha384:{{ composer_installer_signature.content }}"
      when: not composer_bin.stat.exists

    - name: "Running Composer Installer"
      ansible.builtin.command: >
        {{ php_executable }} composer-installer.php {% if composer_version_branch %} {{ composer_version_branch }}{% elif composer_version %} --version={{ composer_version }}{% endif %}
        chdir=/tmp
      when: not composer_bin.stat.exists

    - name: "Moving Composer Into Globally-Accessible Location"
      ansible.builtin.command: >
        mv /tmp/composer.phar {{ composer_path }}
        creates={{ composer_path }}
      when: not composer_bin.stat.exists

    - name: "Updating Composer to Latest Version (if Configured)"
      ansible.builtin.command: >
        {{ php_executable }} {{ composer_path }} self-update {{ composer_version_branch }}
      register: composer_update
      changed_when: "'Updating to version' in composer_update.stdout"
      when: composer_keep_updated | bool

    - name: "Ensuring Composer Directory Exists"
      become: true
      become_user: "{{ composer_home_owner }}"
      ansible.builtin.file:
        path: "{{ composer_home_path }}"
        owner: "{{ composer_home_owner }}"
        group: "{{ composer_home_group }}"
        state: directory
        mode: "0755"

    - name: "Adding GitHub OAuth Token for Composer (if Configured)"
      become: true
      become_user: "{{ composer_home_owner }}"
      ansible.builtin.template:
        src: "auth.json.j2"
        dest: "{{ composer_home_path }}/auth.json"
        owner: "{{ composer_home_owner }}"
        group: "{{ composer_home_group }}"
        mode: "0644"
      when: composer_github_oauth_token | length > 0

    - name: "Including Global Require Tasks"
      ansible.builtin.include_tasks: global-require.yml
      when: composer_global_packages | length > 0

    - name: "Including Project Bin Tasks"
      ansible.builtin.include_tasks: project-bin.yml
      when: composer_add_project_to_path | bool
