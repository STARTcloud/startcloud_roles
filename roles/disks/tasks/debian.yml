---
- name: "Expanding Root Disk"
  become: true
  become_user: root
  when:
    - not vm_encrypted
    - ansible_os_family == 'Debian'
  block:
    - name: "Setting root partition fact"
      ansible.builtin.set_fact:
        root_partition: "{{ ansible_mounts | selectattr('mount', '==', '/') | map(attribute='device') | first | regex_replace('^/dev/', '') }}"

    - name: "Setting root partition fact"
      ansible.builtin.set_fact:
        root_disk: "{{ root_partition | regex_replace('[0-9]+$', '') }}"
        root_partition_number: "{{ root_partition | regex_search('[0-9]+$') }}"

    # growpart exits 0 when it grew the partition (stdout CHANGED:), 1 when there was
    # nothing to grow (NOCHANGE:), and 2+ on real errors. Normalizing rc 1 to success
    # inside the script keeps ansible's non-zero-rc error banner out of healthy runs.
    - name: "Extending the unencrypted Root Partition"
      ansible.builtin.shell: |
        growpart /dev/{{ root_disk }} {{ root_partition_number }}
        rc=$?
        if [ $rc -ne 0 ] && [ $rc -ne 1 ]; then exit $rc; fi
        exit 0
      args:
        executable: /bin/bash
      register: growpart_result
      changed_when: "'CHANGED' in growpart_result.stdout"

    - name: "Resizing the root filesystem"
      ansible.builtin.shell: |
        set -o pipefail
        output=$(resize2fs /dev/{{ root_partition }} 2>&1)
        rc=$?
        echo "$output"
        if echo "$output" | grep -q "Bad magic number"; then exit 0; fi
        exit $rc
      args:
        executable: /bin/bash
      register: resize2fs_result
      changed_when: "'Nothing to do' not in resize2fs_result.stdout"

- name: "Expanding the Encrypted Root Disk"
  become: true
  become_user: root
  when:
    - vm_encrypted
    - ansible_os_family == 'Debian'
  block:
    - name: "Setting root partition fact"
      ansible.builtin.set_fact:
        root_partition: "{{ ansible_mounts | selectattr('mount', '==', '/') | map(attribute='device') | first | regex_replace('^/dev/', '') }}"

    - name: "Setting root partition fact"
      ansible.builtin.set_fact:
        root_disk: "{{ root_partition | regex_replace('[0-9]+$', '') }}"
        root_partition_number: "{{ root_partition | regex_search('[0-9]+$') }}"

    # One step per resize stage; each may legitimately report "nothing to do" on an
    # already-expanded system, so the task never hard-fails (matching the old
    # per-item ignore_errors behavior). The cryptsetup step needs the pipe, hence shell.
    - name: "Extending the Encrypted Root Partition"
      ansible.builtin.shell: |
        set -o pipefail
        growpart /dev/{{ root_disk }} {{ root_partition_number }}
        echo {{ root_unlock_key }} | cryptsetup resize /dev/mapper/{{ root_partition }}_crypt
        pvresize /dev/mapper/{{ root_partition }}_crypt
        lvresize -l+100%FREE /dev/crypt/root
        resize2fs /dev/mapper/crypt-root
      args:
        executable: /bin/bash
      changed_when: true
      failed_when: false

- name: "Configuring Extra Disks"
  become: true
  become_user: root
  when:
    - disks.additional_disks is defined
    - disks.additional_disks is not none
    - disks.additional_disks | length > 0
  block:
    - name: "Gathering disk information"
      when:
        - disks.additional_disks is not none
        - disks.additional_disks | length > 0
      block:
        - name: "Identifying available disks"
          ansible.builtin.shell: |
            set -o pipefail
            lsblk -no NAME -x NAME | grep -v {{ root_disk }}
          args:
            executable: /bin/bash
          register: lsblk_output
          changed_when: false

        - name: "Parsing available disks"
          ansible.builtin.set_fact:
            available_disks: "{{ lsblk_output.stdout_lines }}"

        - name: "Debugging available_disks"
          ansible.builtin.debug:
            var: available_disks

    - name: "Creating Mount Points"
      when:
        - disks.additional_disks is not none
        - disks.additional_disks is iterable
      ansible.builtin.file:
        path: "{{ item.mount }}"
        state: directory
        mode: "0755"
      loop: "{{ disks.additional_disks | default([], true) }}"

    - name: "Creating filesystems on additional disks"
      when:
        - disks.additional_disks is not none
        - disks.additional_disks is iterable
      community.general.filesystem:
        fstype: "{{ item.filesystem }}"
        dev: "/dev/{{ available_disks[index] }}"
      loop: "{{ disks.additional_disks | default([], true) }}"
      loop_control:
        index_var: index

    - name: "Mounting additional disks"
      when:
        - disks.additional_disks is not none
        - disks.additional_disks is iterable
      ansible.posix.mount:
        path: "{{ item.mount }}"
        src: "/dev/{{ available_disks[index] }}"
        fstype: "{{ item.filesystem }}"
        state: mounted
      loop: "{{ disks.additional_disks | default([], true) }}"
      loop_control:
        index_var: index
