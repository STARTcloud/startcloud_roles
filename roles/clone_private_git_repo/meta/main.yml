galaxy_info:
  role_name: clone_private_git_repo
  author: Mark Gilbert
  description: Clones a private GitHub repository (via token or deploy key) and includes any roles it provides.
  company: STARTcloud
  issue_tracker_url: https://github.com/STARTcloud/startcloud_roles/issues
  license: Apache-2.0
  min_ansible_version: '2.15'
  platforms:
    - name: Debian
      versions: ['bookworm', 'trixie']
    - name: Ubuntu
      versions: ['jammy', 'noble']
  galaxy_tags:
    - git
    - github
    - scaffolding
    - template
dependencies: []
collections:
  - startcloud.startcloud_roles
