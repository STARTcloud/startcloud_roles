---
- name: "Copying Drush Makefile Into Place"
  ansible.builtin.copy:
    src: "{{ drush_makefile_path }}"
    dest: /tmp/drupal.make.yml
    mode: "0644"
  when: not drupal_site_exists

- name: "Ensuring Drupal Core Path Directory Exists"
  ansible.builtin.file:
    path: "{{ drupal_core_path }}"
    state: directory
    recurse: true
    mode: "0775"
  become: false
  when: not drupal_site_exists

- name: "Generating Drupal Site With Drush Makefile"
  changed_when: false
  ansible.builtin.command:
    cmd: "{{ drush_path }} make -y /tmp/drupal.make.yml {{ drush_make_options }}"
    chdir: "{{ drupal_core_path }}"
  when: not drupal_site_exists
  become: false

- name: "Checking If A composer.json File Is Present"
  ansible.builtin.stat:
    path: "{{ drupal_core_path }}/composer.json"
  register: drupal_core_composer_file
  when: not drupal_site_exists

- name: "Running Composer Install When composer.json Is Present"
  ansible.builtin.command:
    cmd: composer install
    chdir: "{{ drupal_core_path }}"
  when: not drupal_site_exists and drupal_core_composer_file.stat.exists
  changed_when: false
  become: false
