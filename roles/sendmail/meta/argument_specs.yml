---
argument_specs:
  main:
    short_description: Install and configure the Sendmail MTA.
    description:
      - Installs the Sendmail MTA and its m4 configuration tooling, templates a
        basic sendmail.mc, rebuilds the compiled configuration, and enables the
        service for single-node mail delivery.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      sendmail_packages:
        type: list
        elements: str
        description: Packages installed to provide the Sendmail MTA and its m4 config macros.
      sendmail_service_name:
        type: str
        default: sendmail
        description: Name of the Sendmail system service to enable and manage.
      sendmail_config_dir:
        type: str
        default: /etc/mail
        description: Directory holding sendmail.mc and the compiled configuration.
      sendmail_listen_localhost_only:
        type: bool
        default: true
        description: When true the MTA daemon binds only to 127.0.0.1 instead of all interfaces.
      sendmail_smart_host:
        type: str
        default: ""
        description: Optional relay host to forward outbound mail through; empty disables the smart host.
