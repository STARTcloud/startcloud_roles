---
argument_specs:
  main:
    short_description: Configure host firewall rules
    description:
      - Opens the remote-access ports (XRDP, SSH, Cockpit, VNC) through UFW on Debian-family hosts.
      - On Windows, disables the Domain, Public, and Private firewall profiles and ensures an inbound OpenSSH allow rule exists.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
