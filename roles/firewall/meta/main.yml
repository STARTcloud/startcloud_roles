galaxy_info:
  role_name: firewall
  author: Mark Gilbert
  description: Opens remote-access ports through UFW on Debian-family hosts and disables the firewall profiles while allowing inbound OpenSSH on Windows.
  company: STARTcloud
  issue_tracker_url: https://github.com/STARTcloud/startcloud_roles/issues
  license: Apache-2.0
  min_ansible_version: '2.15'
  platforms:
    - name: Debian
      versions: ['bookworm', 'trixie']
    - name: Ubuntu
      versions: ['jammy', 'noble']
    - name: Windows
      versions: ['2022']
  galaxy_tags:
    - firewall
    - ufw
    - security
    - ports
    - windows
dependencies: []
collections:
  - startcloud.startcloud_roles
