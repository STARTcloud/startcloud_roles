---
argument_specs:
  main:
    short_description: Provision Debian-based thin-client desktops
    description:
      - Creates the Prominic configuration and provisioner directories and copies the Ansible provisioning scripts and generated playbook.
      - Installs helper utilities and configures VMware Horizon client shortcuts, background wallpaper, CA certificates, VPN authentication, cron reauthentication, and Raspberry Pi boot files.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
