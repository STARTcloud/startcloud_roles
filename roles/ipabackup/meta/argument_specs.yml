---
argument_specs:
  main:
    short_description: FreeIPA server backup, restore, and transfer
    description:
      - Backs up a FreeIPA server, copies backups between the server and the Ansible controller, removes server-side backups, and restores a server locally or from the controller.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      ipabackup_gpg:
        type: bool
        default: false
        description: Encrypt the backup with GPG.
      ipabackup_data:
        type: bool
        default: false
        description: Back up (or restore) only the data rather than the full server.
      ipabackup_logs:
        type: bool
        default: false
        description: Include log files in the backup.
      ipabackup_online:
        type: bool
        default: false
        description: Perform the LDAP backup or restore online for data only.
      ipabackup_disable_role_check:
        type: bool
        default: false
        description: Perform the backup even if this host does not have all cluster roles (not recommended).
      ipabackup_no_logs:
        type: bool
        default: false
        description: Do not restore log files from the backup.
      ipabackup_keep_on_server:
        type: bool
        default: false
        description: Keep the local copy of the backup on the server when copying it to the controller.
      ipabackup_to_controller:
        type: bool
        default: false
        description: Copy the backup to the controller, prefixing it with the node name.
      ipabackup_from_controller:
        type: bool
        default: false
        description: Copy or restore a backup from the controller to the server.
      ipabackup_install_packages:
        type: bool
        default: true
        description: Install the packages needed to apply a restore.
      ipabackup_setup_firewalld:
        type: bool
        default: true
        description: Open the needed services in firewalld during a restore.
