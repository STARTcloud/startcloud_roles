---
argument_specs:
  main:
    short_description: mumble-web HTML5 client container deployment
    description:
      - Deploys mumble-web, a browser-based Mumble client, together with mumble-web-proxy which bridges browser WebSocket/WebRTC connections to a Mumble (murmur) server. Both run as Docker containers on a shared network.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      mumble_web_network:
        type: str
        default: mumble-web
        description: Docker network shared by the client and proxy containers.
      mumble_web_restart_policy:
        type: str
        default: unless-stopped
        description: Docker restart policy applied to both containers.
      mumble_web_image:
        type: str
        default: "rankenstein/mumble-web:latest"
        description: mumble-web HTML5 client container image and tag.
      mumble_web_container_name:
        type: str
        default: mumble-web
        description: Name of the mumble-web client container.
      mumble_web_http_port:
        type: int
        default: 8080
        description: Host port mapped to the mumble-web web UI (container 8080).
      mumble_web_proxy_image:
        type: str
        default: "rankenstein/mumble-web-proxy:latest"
        description: mumble-web-proxy container image and tag.
      mumble_web_proxy_container_name:
        type: str
        default: mumble-web-proxy
        description: Name of the mumble-web-proxy container.
      mumble_web_proxy_ws_port:
        type: int
        default: 64737
        description: WebSocket port the proxy listens on and publishes to the host.
      mumble_web_server_host:
        type: str
        default: "127.0.0.1"
        description: Hostname or address of the upstream Mumble (murmur) server.
      mumble_web_server_port:
        type: int
        default: 64738
        description: TCP port of the upstream Mumble (murmur) server.
      mumble_web_ice_port_min:
        type: int
        default: 20000
        description: Lower bound of the UDP port range published for WebRTC (ICE) voice.
      mumble_web_ice_port_max:
        type: int
        default: 20010
        description: Upper bound of the UDP port range published for WebRTC (ICE) voice.
