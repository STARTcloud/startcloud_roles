---
galaxy_info:
  role_name: bigbluebutton
  author: Mark Gilbert
  description: Installs the BigBlueButton web conferencing platform on Ubuntu with optional firewall, NAT, SSL, SIP and Greenlight.
  company: STARTcloud
  issue_tracker_url: https://github.com/STARTcloud/startcloud_roles/issues
  license: Apache-2.0
  min_ansible_version: "2.15"
  platforms:
    - name: Ubuntu
      versions: ["xenial"]
  galaxy_tags:
    - bigbluebutton
    - conferencing
    - webrtc
    - video
dependencies:
  - role: geerlingguy.certbot
    vars:
      certbot_install_method: package
      certbot_create_if_missing: true
      certbot_auto_renew: true
      certbot_auto_renew_user: "{{ ansible_user | default(lookup('env', 'USER')) }}"
      certbot_auto_renew_hour: "1"
      certbot_auto_renew_minute: "44"
      certbot_auto_renew_options: "--quiet"
      certbot_admin_email: "{{ bbb_ssl_email }}"
      certbot_certs:
        - email: "{{ bbb_ssl_email }}"
          webroot: "{{ bbb_ssl_webroot_path }}"
          domains: "{{ bbb_server_names }}"
    when: bbb_configure_ssl == True
  - role: geerlingguy.docker
    vars:
      docker_install_compose: true
collections:
  - startcloud.startcloud_roles
