---
- name: "Importing NodeSource RPM key"
  ansible.builtin.rpm_key:
    key: https://rpm.nodesource.com/gpgkey/nodesource.gpg.key
    state: present

- name: "Adding NodeSource repository for Node.js"
  ansible.builtin.dnf:
    name: "https://rpm.nodesource.com/pub_{{ nodejs_version }}/nodistro/repo/nodesource-release-nodistro-1.noarch.rpm"
    state: present
  notify: "Updating package cache after NodeSource repository change"
  when: ansible_distribution_major_version | int >= 7

- name: "Flushing handlers to refresh the package cache before install"
  ansible.builtin.meta: flush_handlers

- name: "Ensuring Node.js and npm are installed"
  ansible.builtin.dnf:
    name: "nodejs-{{ nodejs_version | regex_replace('x', '') }}*"
    state: present
    enablerepo: nodesource
