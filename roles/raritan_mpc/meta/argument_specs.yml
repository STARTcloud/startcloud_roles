---
argument_specs:
  main:
    short_description: Install Raritan PDU SNMP management tooling.
    description:
      - Installs SNMP command-line and MIB tooling used to query and manage Raritan Master Power Control PDUs.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      raritan_mpc_packages:
        type: list
        elements: str
        description: SNMP tooling packages installed for managing Raritan PDUs.
