---
- name: "Block to Allow Loading of Variables without running task"
  when: run_tasks
  block:
    - name: "Enabling i386 Repo for Crossover and Updating Sources"
      become: true
      ansible.builtin.shell: "dpkg --add-architecture i386 && apt-get update -y"
    - name: "Installing Required Dependencies for Crossover -- Takes about 3 Mins"
      ansible.builtin.apt:
        name: "{{ packages }}"
      vars:
        packages:
          - "gstreamer1.0-plugins-good:i386"
          - "libasound2t64:i386"
          - "libcapi20-3:i386"
          - "libfontconfig1:i386"
          - "libgphoto2-6:i386"
          - "libgsm1:i386"
          - "libgstreamer1.0-0:i386"
          - "libldap2:i386"
          - "libopenal1:i386"
          - "libosmesa6:i386"
          - "libtiff6:i386"
          - "libudev1:i386"
          - "libv4l-0:i386"
          - "libxcomposite1:i386"
          - "libxinerama1:i386"
          - "libxml2:i386"
          - "libxslt1.1:i386"
          - "gstreamer1.0-libav:i386"
          - "libncurses6:i386"
          - "libsane:i386"

    - name: "Downloading Crossover"
      delay: 5
      ansible.builtin.get_url:
        dest: "/tmp/crossover.deb"
        url: "http://crossover.codeweavers.com/redirect/crossover.deb"
      register: Crossover_source
      retries: 5
      until: "Crossover_source is success"
    - name: "Downloading and Installing Crossover -- Takes about 5 Mins"
      ansible.builtin.apt:
        deb: "/tmp/crossover.deb"
      retries: 5
      delay: 10
      register: cxresult
      until: cxresult is success
    - name: "Installing Python and Screen"
      ansible.builtin.apt:
        name: "{{ packages }}"
      retries: 5
      delay: 10
      register: screen
      until: screen is success
      vars:
        packages:
          - screen
          - python3-psutil
    - name: "Installing PSUtil"
      ansible.builtin.pip:
        name: psutil
    - name: "Installing extra Libraries and Drivers"
      register: cxfixresults
      ansible.builtin.shell: "/opt/cxoffice/bin/cxfix --auto --dry-run"
    - name: "Checking for Additional Libraries and Software:"
      ansible.builtin.set_fact:
        results: "{{ cxfixresults.stdout | regex_search(regexp, '\\1') }}"
      vars:
        regexp: \n(None)\n
    - name: "Displaying Software Needed:"
      ansible.builtin.debug:
        var: results
    - name: "Changing perm of Jars"
      ansible.builtin.file:
        path: /jars
        owner: vagrant
        mode: "0777"
        recurse: true
