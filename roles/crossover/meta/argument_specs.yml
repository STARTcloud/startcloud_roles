---
argument_specs:
  main:
    short_description: CodeWeavers CrossOver installation
    description:
      - Installs CodeWeavers CrossOver and its 32-bit runtime dependencies on Debian-based systems, then runs cxfix and adjusts jar permissions.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
