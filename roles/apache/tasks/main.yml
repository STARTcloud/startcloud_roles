---
-
  name: "Block to Allow Loading of Variables without running task"
  when: run_tasks
  block:
    # Include variables and define needed variables.
    -
      name: "Including OS-specific variables"
      ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"

    -
      name: "Including variables for Amazon Linux"
      ansible.builtin.include_vars: "AmazonLinux.yml"
      when:
        - ansible_distribution == "Amazon"
        - ansible_distribution_major_version == "NA"

    -
      name: "Defining apache_packages"
      ansible.builtin.set_fact:
        apache_packages: "{{ __apache_packages | list }}"
      when: apache_packages is not defined

    -
      name: "Including Tasks"
      ansible.builtin.include_tasks: "setup-{{ ansible_os_family }}.yml"

    # Figure out what version of Apache is installed.
    -
      name: "Getting installed version of Apache"
      ansible.builtin.command: "{{ apache_daemon_path }}{{ apache_daemon }} -v"
      changed_when: false
      check_mode: false
      register: _apache_version

    -
      name: "Creating apache_version variable"
      ansible.builtin.set_fact:
        apache_version: "{{ _apache_version.stdout.split()[2].split('/')[1] }}"

    -
      name: "Including Apache 2.2 variables"
      ansible.builtin.include_vars: apache-22.yml
      when: "apache_version.split('.')[1] == '2'"

    -
      name: "Including Apache 2.4 variables"
      ansible.builtin.include_vars: apache-24.yml
      when: "apache_version.split('.')[1] == '4'"

    # Configure Apache.
    -
      name: "Configuring Apache"
      ansible.builtin.include_tasks: "configure-{{ ansible_os_family }}.yml"

    -
      name: "Ensuring Apache has selected state and enabled on boot"
      ansible.builtin.service:
        name: "{{ apache_service }}"
        state: "{{ apache_state }}"
        enabled: "{{ apache_enabled }}"
