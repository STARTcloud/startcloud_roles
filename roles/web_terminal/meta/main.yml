galaxy_info:
  role_name: web_terminal
  author: Mark Gilbert
  description: Installs the STARTcloud web-terminal (from apt or built from source), renders its config, and runs it via systemd or supervisord.
  company: STARTcloud
  issue_tracker_url: https://github.com/STARTcloud/startcloud_roles/issues
  license: Apache-2.0
  min_ansible_version: '2.15'
  platforms:
    - name: Debian
      versions: ['bookworm', 'trixie']
    - name: Ubuntu
      versions: ['jammy', 'noble']
  galaxy_tags:
    - webterminal
    - terminal
    - console
    - webserver
dependencies: []
collections:
  - startcloud.startcloud_roles
