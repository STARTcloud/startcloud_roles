galaxy_info:
  role_name: desktop_gnome
  author: Mark Gilbert
  description: Installs and configures the GNOME desktop environment on Debian and Ubuntu, including extensions, dconf settings, and polkit rules.
  company: STARTcloud
  issue_tracker_url: https://github.com/STARTcloud/startcloud_roles/issues
  license: Apache-2.0
  min_ansible_version: '2.15'
  platforms:
    - name: Debian
      versions: ['bookworm', 'trixie']
    - name: Ubuntu
      versions: ['jammy', 'noble']
  galaxy_tags:
    - desktop
    - gnome
    - gui
    - gtk
dependencies: []
collections:
  - startcloud.startcloud_roles
