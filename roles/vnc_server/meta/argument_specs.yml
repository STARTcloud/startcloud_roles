---
argument_specs:
  main:
    short_description: Installs and configures a TigerVNC server
    description:
      - Installs the TigerVNC server, disables screen locking, creates a dedicated VNC user with an SSH keypair, and manages the server as a systemd service.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      vnc_server_password:
        type: str
        default: "{{ lookup('password', '/tmp/vnc_password.txt') }}"
        description: Password used to authenticate to the VNC server; defaults to a generated random password saved to /tmp.
      vnc_server_private_ssh_key:
        type: str
        default: ""
        description: Private SSH key installed for the VNC user to enable Guacamole file transfers.
      vnc_server_public_ssh_key:
        type: str
        default: ""
        description: Public SSH key installed and added as an authorized key for the VNC user.
      vnc_server_ssh_key_type:
        type: str
        default: ed25519
        description: SSH key type for the VNC user's keypair (dsa, ecdsa, ecdsa_sk, ed25519, ed25519_sk, or rsa).
      vnc_server_username:
        type: str
        default: vnc
        description: Name of the dedicated user account the VNC server runs as.
