---
- name: "Copying external certificates"
  vars:
    __item_basename: "{{ item | basename }}"
  block:
    - name: "Install - Initializing ipaserver_external_cert_files"
      ansible.builtin.set_fact:
        ipaserver_external_cert_files: []
      when: ipaserver_external_cert_files is undefined
    - name: "Install - Copying \"{{ item + \" \" + inventory_hostname + ':/root/' + __item_basename }}\""
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "/root/{{ __item_basename }}"
        mode: preserve
        force: true
    - name: "Install - Extending ipaserver_external_cert_files with \"/root/{{ __item_basename }}\""
      ansible.builtin.set_fact:
        ipaserver_external_cert_files: "{{ ipaserver_external_cert_files + ['/root/' + (__item_basename)] }}"
