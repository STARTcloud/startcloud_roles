---
argument_specs:
  main:
    short_description: Install and configure a FreeIPA server
    description:
      - Installs the FreeIPA server packages and deploys an IPA domain controller.
      - Supports optional integrated DNS, KRA, AD trust and CA configuration, plus firewalld setup and domain removal on uninstall.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      ipaserver_no_host_dns:
        type: bool
        default: false
        description: Do not use DNS for hostname lookup during installation.
      ipaserver_setup_adtrust:
        type: bool
        default: false
        description: Configure AD Trust capability on the server.
      ipaserver_setup_kra:
        type: bool
        default: false
        description: Install and configure a KRA (Key Recovery Authority) on this server.
      ipaserver_setup_dns:
        type: bool
        default: false
        description: Configure an integrated DNS server and create the DNS zone for the domain.
      ipaserver_no_hbac_allow:
        type: bool
        default: false
        description: Do not install the default allow_all HBAC rule.
      ipaserver_no_pkinit:
        type: bool
        default: false
        description: Disable pkinit setup steps.
      ipaserver_no_ui_redirect:
        type: bool
        default: false
        description: Do not automatically redirect the web root to the IPA Web UI.
      ipaserver_mem_check:
        type: bool
        default: true
        description: Check for the minimum required memory before deploying.
      ipaserver_random_serial_numbers:
        type: bool
        default: false
        description: Enable use of random serial numbers for certificates (requires FreeIPA 4.10+).
      ipaclient_mkhomedir:
        type: bool
        default: false
        description: Configure PAM to create a home directory on first login.
      ipaclient_no_ntp:
        type: bool
        default: false
        description: Do not configure or enable NTP time synchronization.
      ipaserver_external_ca:
        type: bool
        default: false
        description: Generate a CSR for the IPA CA certificate to be signed by an external CA.
      ipaserver_allow_zone_overlap:
        type: bool
        default: false
        description: Allow creation of a (reverse) DNS zone even if it is already resolvable.
      ipaserver_no_reverse:
        type: bool
        default: false
        description: Do not create a reverse DNS zone.
      ipaserver_auto_reverse:
        type: bool
        default: false
        description: Try to resolve reverse records and reverse zones for server IP addresses.
      ipaserver_no_forwarders:
        type: bool
        default: false
        description: Do not add any DNS forwarders; root DNS servers are used instead.
      ipaserver_auto_forwarders:
        type: bool
        default: false
        description: Add DNS forwarders from /etc/resolv.conf to the IPA DNS configuration.
      ipaserver_no_dnssec_validation:
        type: bool
        default: false
        description: Disable DNSSEC validation on this server.
      ipaserver_enable_compat:
        type: bool
        default: false
        description: Enable trusted-domain user support for old clients via the Schema Compatibility plugin.
      ipaserver_setup_ca:
        type: bool
        default: true
        description: Install and configure the IPA certificate authority.
      ipaserver_install_packages:
        type: bool
        default: true
        description: Install the required FreeIPA server packages on the node.
      ipaserver_setup_firewalld:
        type: bool
        default: true
        description: Open the required services in the firewalld-managed firewall.
      ipaserver_copy_csr_to_controller:
        type: bool
        default: false
        description: Copy the generated CSR from the server back to the controller.
      ipaserver_ignore_topology_disconnect:
        type: bool
        default: false
        description: Force server removal even if it results in a topology disconnect (uninstall).
      ipaserver_ignore_last_of_role:
        type: bool
        default: false
        description: Force server removal even if it is the last server holding a role (uninstall).
      ipaserver_remove_from_domain:
        type: bool
        default: false
        description: Remove the server from the domain in addition to undeploying it (uninstall).
