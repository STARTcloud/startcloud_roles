---
argument_specs:
  main:
    short_description: Post-provisioning Vagrant help file
    description:
      - Detects the instance's primary address and renders a help file of common Vagrant/VM commands, then displays it at the end of provisioning.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      show_help:
        type: bool
        default: true
        description: Whether to display the rendered help text during the run.
