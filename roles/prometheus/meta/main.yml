galaxy_info:
  role_name: prometheus
  author: Mark Gilbert
  description: Installs the Prometheus monitoring server from official release binaries and manages it as a systemd service.
  company: STARTcloud
  issue_tracker_url: https://github.com/STARTcloud/startcloud_roles/issues
  license: Apache-2.0
  min_ansible_version: '2.15'
  platforms:
    - name: Debian
      versions: ['bookworm', 'trixie']
    - name: Ubuntu
      versions: ['jammy', 'noble']
    - name: EL
      versions: ['8', '9']
  galaxy_tags:
    - monitoring
    - prometheus
    - metrics
    - observability
    - systemd
dependencies: []
collections:
  - startcloud.startcloud_roles
