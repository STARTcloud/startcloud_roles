---
argument_specs:
  main:
    short_description: Install and configure the Dante SOCKS5 proxy
    description:
      - Installs the Dante SOCKS5 proxy server, writes a default danted.conf,
        creates a dedicated SOCKS system user, and restarts the danted service.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      dante_user:
        type: str
        default: dante
        description: Name of the dedicated system user created for SOCKS authentication.
      dante_pass:
        type: str
        default: dante24@!
        description: Password associated with the dedicated SOCKS user.
      packages:
        type: list
        elements: str
        default: ['dante-server']
        description: APT packages installed to provide the Dante server.
