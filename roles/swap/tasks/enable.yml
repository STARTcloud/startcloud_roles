---
- name: "Ensuring swap file exists"
  ansible.builtin.command:
    cmd: "{{ swap_file_create_command }}"
    creates: "{{ swap_file_path }}"
  register: swap_file_create
  notify:
    - Making swap file if necessary

- name: "Setting permissions on swap file"
  ansible.builtin.file:
    path: "{{ swap_file_path }}"
    owner: root
    group: root
    mode: "0600"

- name: "Setting swappiness"
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "{{ swap_swappiness }}"
    state: present
