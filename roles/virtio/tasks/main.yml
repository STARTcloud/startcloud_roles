---
-
  name: "Managing progress for {{ ansible_role_name }}"
  when: count_progress | default(false)
  run_once: true
  block:
    -
      name: "Incrementing global progress step counter for {{ ansible_role_name }}"
      ansible.builtin.set_fact:
        global_current_progress_step: "{{ global_current_progress_step | default(0) | int + 1 }}"

    -
      name: "Including progress reporting task for {{ ansible_role_name }}"
      ansible.builtin.include_role:
        name: startcloud.startcloud_roles.progress
      vars:
        _progress_role_is_setup_run: false
        current_progress_step: "{{ global_current_progress_step | default(0) }}"
        progress_description: "{{ progress_role_description | default('Processing ' + ansible_role_name) }}"

-
  name: "Block to Allow Loading of Variables without running task"
  when: run_tasks
  block:
    -
      name: "Installing VirtIO drivers and QEMU Guest Agent from the attached virtio-win media"
      block:
        -
          name: "Locating the VirtIO media (CD-ROM containing {{ virtio_gt_msi }})"
          ansible.windows.win_powershell:
            script: |
              $ErrorActionPreference = 'Stop'
              $drive = Get-CimInstance Win32_LogicalDisk -Filter 'DriveType=5' |
                       Where-Object { Test-Path (Join-Path $_.DeviceID '{{ virtio_gt_msi }}') } |
                       Select-Object -First 1 -ExpandProperty DeviceID
              if ( -not $drive ) { throw 'VirtIO media not found: no CD-ROM contains {{ virtio_gt_msi }}' }
              $Ansible.Result = $drive
          register: virtio_media

        -
          name: "Installing VirtIO drivers (all components)"
          ansible.windows.win_package:
            path: "{{ virtio_media.result }}\\{{ virtio_gt_msi }}"
            arguments: "/qn /norestart ADDLOCAL=ALL"
            state: present
            expected_return_code:
              - 0
              - 3010

        -
          name: "Installing QEMU Guest Agent"
          ansible.windows.win_package:
            path: "{{ virtio_media.result }}\\{{ qemu_ga_msi }}"
            arguments: "/qn /norestart"
            state: present
            expected_return_code:
              - 0
              - 3010

        -
          name: "Ensuring QEMU Guest Agent service is automatic and running"
          ansible.windows.win_service:
            name: "{{ qemu_ga_service_name }}"
            start_mode: auto
            state: started
