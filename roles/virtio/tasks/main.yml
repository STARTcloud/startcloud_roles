---
- name: "Block to Allow Loading of Variables without running task"
  when: run_tasks
  block:
    - name: "Installing VirtIO drivers and QEMU Guest Agent from the attached virtio-win media"
      block:
        - name: "Locating the VirtIO media, or downloading and mounting the ISO if no CD-ROM is attached"
          ansible.windows.win_powershell:
            parameters:
              IsoUrl: "{{ virtio_iso_url | default('') }}"
              GtMsi: "{{ virtio_gt_msi }}"
            script: |
              param($IsoUrl, $GtMsi)
              $ErrorActionPreference = 'Stop'
              # Prefer the attached CD-ROM (additional_iso_files during the Packer build)
              $drive = Get-CimInstance Win32_LogicalDisk -Filter 'DriveType=5' |
                       Where-Object { Test-Path (Join-Path $_.DeviceID $GtMsi) } |
                       Select-Object -First 1 -ExpandProperty DeviceID
              if ( $drive ) {
                $Ansible.Result = @{ drive = $drive; mounted = $false; iso = '' }
                return
              }
              # Fallback: no CD-ROM found - download the virtio-win ISO and mount it
              if ( -not $IsoUrl ) {
                throw 'VirtIO media not found on any CD-ROM and no virtio_iso_url is set for the download fallback'
              }
              $iso = Join-Path $env:TEMP 'virtio-win.iso'
              Invoke-WebRequest -Uri $IsoUrl -OutFile $iso -UseBasicParsing
              Mount-DiskImage -ImagePath $iso | Out-Null
              Start-Sleep -Seconds 3
              $letter = (Get-DiskImage -ImagePath $iso | Get-Volume).DriveLetter
              if ( -not $letter ) { throw 'Mounted VirtIO ISO but could not determine its drive letter' }
              if ( -not (Test-Path (Join-Path "$($letter):" $GtMsi)) ) {
                throw "Mounted VirtIO ISO ($($letter):) does not contain $GtMsi"
              }
              $Ansible.Result = @{ drive = "$($letter):"; mounted = $true; iso = $iso }
          register: virtio_media

        - name: "Installing VirtIO drivers (all components)"
          ansible.windows.win_package:
            path: "{{ virtio_media.result.drive }}\\{{ virtio_gt_msi }}"
            arguments: "/qn /norestart ADDLOCAL=ALL"
            state: present
            expected_return_code:
              - 0
              - 3010
          async: 600
          poll: 0
          register: virtio_gt_install

        - name: "Waiting for WinRM to recover (the NetKVM network driver install briefly resets the NIC)"
          ansible.builtin.wait_for_connection:
            delay: 15
            timeout: 600

        - name: "Confirming the VirtIO driver install finished"
          ansible.builtin.async_status:
            jid: "{{ virtio_gt_install.ansible_job_id }}"
          register: virtio_gt_status
          until: virtio_gt_status.finished
          retries: 30
          delay: 20

        - name: "Installing QEMU Guest Agent"
          ansible.windows.win_package:
            path: "{{ virtio_media.result.drive }}\\{{ qemu_ga_msi }}"
            arguments: "/qn /norestart"
            state: present
            expected_return_code:
              - 0
              - 3010

        - name: "Ensuring QEMU Guest Agent service is automatic and running"
          ansible.windows.win_service:
            name: "{{ qemu_ga_service_name }}"
            start_mode: auto
            state: started

        - name: "Dismounting and removing the downloaded VirtIO ISO (fallback path only)"
          when: virtio_media.result.mounted | default(false)
          ansible.windows.win_powershell:
            parameters:
              Iso: "{{ virtio_media.result.iso }}"
            script: |
              param($Iso)
              if ( $Iso -and (Test-Path $Iso) ) {
                Dismount-DiskImage -ImagePath $Iso -ErrorAction SilentlyContinue | Out-Null
                Remove-Item $Iso -Force -ErrorAction SilentlyContinue
              }
