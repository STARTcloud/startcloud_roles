---
argument_specs:
  main:
    short_description: Configure Windows power management settings.
    description:
      - Configures Windows power management via registry keys and powercfg, covering hibernate, screen saver, monitor timeouts, and the active power plan.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      disable_hibernate:
        type: bool
        default: true
        description: When true, disables hibernation and sets the hibernate file size percentage.
      hibernate_file_size_percent:
        type: int
        default: 0
        description: Hibernate file size as a percentage of RAM written to the HiberFileSizePercent registry value.
      disable_screensaver:
        type: bool
        default: true
        description: When true, disables the interactive screen saver for the current user.
      monitor_timeout_ac:
        type: int
        default: 0
        description: Monitor timeout in minutes while on AC power (0 = never).
      monitor_timeout_dc:
        type: int
        default: 0
        description: Monitor timeout in minutes while on DC/battery power (0 = never).
      set_high_performance:
        type: bool
        default: true
        description: When true, sets the active Windows power plan to High Performance.
