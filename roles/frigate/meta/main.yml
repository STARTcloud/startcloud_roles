galaxy_info:
  role_name: frigate
  author: Mark Gilbert
  description: Deploys the Frigate NVR (object-detection camera server) as a Docker container.
  company: STARTcloud
  issue_tracker_url: https://github.com/STARTcloud/startcloud_roles/issues
  license: Apache-2.0
  min_ansible_version: '2.15'
  platforms:
    - name: Debian
      versions: ['bookworm', 'trixie']
    - name: Ubuntu
      versions: ['jammy', 'noble']
  galaxy_tags:
    - frigate
    - nvr
    - docker
    - surveillance
    - cctv
dependencies:
  - role: startcloud.startcloud_roles.docker
collections:
  - startcloud.startcloud_roles
