---
argument_specs:
  main:
    short_description: Installs and configures a Jenkins CI server on Debian/Ubuntu.
    description:
      - Installs Jenkins from the upstream Debian repository and its build dependencies.
      - Prepares filesystem permissions, bypasses the initial setup wizard and security realm, installs core plugins, configures git, and creates desktop launchers.
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
