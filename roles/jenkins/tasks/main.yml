---
-
  name: "Block to Allow Loading of Variables without running task"
  when: run_tasks
  block:
    -
      ansible.builtin.apt:
        name: "{{ packages }}"
      name: "Installing Required Jenkins Dependencies -- Takes about 5 Mins"
      vars:
        packages:
          - gnupg
          - xmlstarlet
          - git-core

    -
      name: "Creating Backup Directory for Script outputs"
      ansible.builtin.file:
        path: /backup
        owner: "{{ user }}"
        group: "{{ group }}"
        mode: '0755'
        state: directory
    -
      ansible.builtin.apt_key:
        state: present
        url: "https://pkg.jenkins.io/debian/jenkins.io.key"
      name: "Installing Jenkins Apt Key"
    -
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/jenkins.list
        state: touch
      name: "Creating Jenkins Sources.list folder"
    -
      ansible.builtin.lineinfile:
        line: "deb http://pkg.jenkins.io/debian-stable binary/"
        path: /etc/apt/sources.list.d/jenkins.list
      name: "Adding Jenkins to Sources.list"

    -
      ansible.builtin.apt:
        name: "{{ packages }}"
        install_recommends: false
        update_cache: true
      name: "Installing Jenkins -- Takes about 3 Minutes"
      vars:
        packages:
          - jenkins
    -
      name: "Starting Jenkins Service"
      ansible.builtin.service:
        enabled: false
        name: jenkins
        state: restarted
    -
      name: "Stopping Jenkins Service"
      ansible.builtin.service:
        enabled: false
        name: jenkins
        state: stopped
    -
      ansible.builtin.file:
        group: "{{ group }}"
        mode: 0751
        owner:  "{{ user }}"
        path: /var/cache/jenkins
        recurse: true
      name: "Preparing Jenkins Cache folder permissions for user setup"
    -
      ansible.builtin.file:
        group: "{{ group }}"
        owner:  "{{ user }}"
        path: /var/lib/jenkins
        recurse: true
      name: "Preparing Jenkins Library folder permissions for user setup"
    -
      ansible.builtin.file:
        group: "{{ group }}"
        owner:  "{{ user }}"
        path: /var/run/jenkins
        recurse: true
      name: "Preparing Jenkins run folder permissions for user setup"
    -
      ansible.builtin.file:
        group: "{{ group }}"
        owner:  "{{ user }}"
        path: /var/log/jenkins
        recurse: true
      name: "Preparing Jenkins log folder permissions for user setup"
    -
      ansible.builtin.lineinfile:
        regexp: '^JAVA_ARGS='
        line: 'JAVA_ARGS="-Djava.awt.headless=true -Djenkins.install.runSetupWizard=false"'
        path: /etc/default/jenkins
      name: "Skipping Initial Configuration"

    -
      ansible.builtin.lineinfile:
        insertafter: "^# user and group"
        line: JENKINS_USER="{{ user }}"
        path: /etc/default/jenkins
        regexp: ^JENKINS_USER=
      name: "Setting Jenkins to start as user"
    -
      ansible.builtin.lineinfile:
        insertafter: "^# user and group"
        line: JENKINS_GROUP="{{ group }}"
        path: /etc/default/jenkins
        regexp: ^JENKINS_GROUP=
      name: "Setting Jenkins to start as user"
    -
      name: "Starting Jenkins Service"
      ansible.builtin.service:
        enabled: false
        name: jenkins
        state: started
    - ansible.builtin.pause:
        minutes: 1
      name: "Waiting for Jenkins Config.XML to generate before stopping service."
    -
      name: "Stopping Jenkins Service"
      ansible.builtin.service:
        enabled: false
        name: jenkins
        state: stopped
    -
      ansible.builtin.copy:
        dest: /var/lib/jenkins/config.xml.orig
        src: /var/lib/jenkins/config.xml
        remote_src: true
      name: "Backing up Config.XML to Config.XML.orig"

    -
      become: true
      name: "Configuring Jenkins"
      ansible.builtin.shell: "cd /var/lib/jenkins && tail -n +2 config.xml.orig >config.xml && xmlstarlet edit --inplace -u '/hudson/useSecurity' -v 'false' config.xml && xmlstarlet edit --inplace -d '/hudson/authorizationStrategy' config.xml && xmlstarlet edit --inplace -d '/hudson/securityRealm' config.xml && xmlstarlet edit --inplace -u '/hudson/installStateName' -v 'RUNNING' config.xml &&  diff -u config.xml{.orig,} || true"

    -
       name: "Checking if /var/lib/jenkins/init.groovy.d exists"
       ansible.builtin.stat:
         path: /var/lib/jenkins/init.groovy.d
       register: output_folder

    -
      name: "Creating output directory if not exists"
      ansible.builtin.file:
        path: /var/lib/jenkins/init.groovy.d
        state: directory
        owner: "{{ user }}"
        group: "{{ group }}"
        mode: 0775
      when: output_folder.stat.exists == false

    -
      become: true
      name: "Disabling the Security Check so we can download Plugins"
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: "{{ user }}"
        group: "{{ group }}"
        mode: '0644'
      with_items:
        - { src: basic-security.groovy.j2 , dest: "/var/lib/jenkins/init.groovy.d/basic-security.groovy" }
    -
      name: "Starting Jenkins Service"
      ansible.builtin.service:
        enabled: true
        name: jenkins
        state: started
    -
      delay: 5
      ansible.builtin.get_url:
        dest: "/home/{{ user }}/jenkins-cli.jar"
        url: "http://localhost:8080/jnlpJars/jenkins-cli.jar"
      name: "Downloading  Jenkins CLI from localhost"
      register: jenkinscli_source
      retries: 5
      until: "jenkinscli_source is success"
    -
      name: "Waiting until Jenkins web API is available"
      ansible.builtin.uri:
        url: "http://localhost:8080/cli/"
        status_code: 200
      register: result
      until: result.status == 200
      retries: 600
      delay: 2
    -
      name: "Adding Xvfb Plugin details"
      ansible.builtin.template:
        src: org.jenkinsci.plugins.xvfb.Xvfb.xml
        dest: /var/lib/jenkins/
        owner: "{{ user }}"
        group: "{{ group }}"
        mode: u=rwX,g=rX,o=rX
    -
      become: true
      name: "Installing Jenkins Plugins"
      ansible.builtin.shell: "cd /home/{{ user }} && java -jar jenkins-cli.jar -s http://localhost:8080/ install-plugin xvfb xunit workflow-step-api scm-api structs junit script-security git email-ext email-ext-recipients-column mailer"
      retries: 5
      delay: 5
    -
      community.general.git_config:
        name: user.email
        scope: global
        value: "{{ certbot_admin_email }}"
      name: "Configuring git Email"
    -
      community.general.git_config:
        name: user.name
        scope: global
        value: "{{ jenkins_git_user }}"
      name: "Configuring git User Name"
    -
      community.general.git_config:
        name: push.default
        scope: global
        value: simple
      name: "Configuring git Push"
    -
      community.general.git_config:
        name: core.autocrlf
        scope: global
        value: false
      name: "Configuring git AutoCRLF"
    -
      name: "Finding Java accessibility.properties files"
      ansible.builtin.find:
        paths: /etc
        patterns: accessibility.properties
        recurse: true
        depth: 2
      register: java_accessibility_files

    -
      name: "Fixing Java Assistive Tech"
      ansible.builtin.lineinfile:
        insertafter: "^#assistive_technologi"
        line: "#"
        path: "{{ item.path }}"
        regexp: "^assistive_technologi"
      loop: "{{ java_accessibility_files.files }}"
      loop_control:
        label: "{{ item.path }}"
    -
      ansible.builtin.file:
        group: "{{ group }}"
        owner:  "{{ user }}"
        path: "/home/{{ user }}"
        recurse: true
      name: "Setting {{ user }} permissions"
    -
      name: "Removing Groovy Startup Bypass"
      ansible.builtin.file:
        path: /var/lib/jenkins/init.groovy.d/basic-security.groovy
        state: absent
    -
      become: true
      name: "Adding Jenkins Desktop Icon"
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: "{{ user }}"
        group: "{{ group }}"
        mode: '0755'
      with_items:
        - { src: "jenkins.desktop" , dest: "/usr/share/applications/jenkins.desktop" }
        - { src: "jenkins.desktop" , dest: "/home/{{ user }}/Desktop/jenkins.desktop" }

    -
      ansible.builtin.command: "dbus-launch gio set {{ item }}  \"metadata::trusted\" true"
      name: "Ensuring that Desktop Icons are Launchable"
      with_items:
        - "/home/{{ user }}/Desktop/jenkins.desktop"
        - "/usr/share/applications/jenkins.desktop"

    -
      become: true
      name: "Adding Jenkins Jobs to Desktop"
      ansible.builtin.copy:
        src: "{{item.src}}"
        dest: "{{item.dest}}"
        owner: "{{ user }}"
        group: "{{ user }}"
        remote_src: true
      with_items:
        - { src: /vagrant/jobs , dest: "/home/{{ user }}/Desktop" }
