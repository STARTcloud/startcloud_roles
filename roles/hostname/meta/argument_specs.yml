---
argument_specs:
  main:
    short_description: System hostname configuration
    description:
      - Sets the system hostname (Linux/FreeBSD via hostname, Windows via win_hostname with a reboot) and updates /etc/hosts on non-Windows guests.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      show_help:
        type: bool
        default: true
        description: Whether to display help/informational output.
