---
argument_specs:
  main:
    short_description: Firefox installation and enterprise policy hardening
    description:
      - Adds the Mozilla Team PPA, installs and pins the .deb Firefox build (avoiding the snap), and deploys hardened enterprise policies and system preferences.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
