---
- name: "Block to Allow Loading of Variables without running task"
  when: run_tasks
  block:
    - name: "Getting the current kernel release."
      changed_when: false
      ansible.builtin.command: "uname -r"
      register: kernel_release
      when: "ansible_os_family == 'RedHat'"

    - name: "Setting the appropriate libselinux package for RHEL 8."
      ansible.builtin.set_fact:
        packer_rhel_libselinux_package: python3-libselinux
      when: "ansible_os_family == 'RedHat'"

    - name: "Ensuring necessary packages are installed."
      when: "ansible_os_family == 'RedHat'"
      ansible.builtin.dnf:
        name:
          - "kernel-devel-{{ kernel_release.stdout }}"
          - "{{ packer_rhel_libselinux_package }}"
        state: present

    - name: "Including VirtualBox guest additions tasks."
      ansible.builtin.include_tasks: virtualbox.yml
      when: "'virtualbox' in ansible_virtualization_type | lower"

    - name: "Including VMware guest additions tasks."
      ansible.builtin.include_tasks: vmware.yml
      when: "'vmware' in ansible_virtualization_type | lower"

    - name: "Cleaning up yum."
      changed_when: true
      ansible.builtin.command:
        cmd: yum clean all
      when: "ansible_os_family == 'RedHat'"

    - name: "Removing any remnants of VirtualBox ISOs."
      ansible.builtin.shell: "rm -rf VBoxGuestAdditions_*.iso VBoxGuestAdditions_*.iso.?"
      changed_when: true
      when: "ansible_os_family == 'RedHat'"

    - name: "Removing RedHat interface persistence (step 1)."
      ansible.builtin.file:
        path: /etc/udev/rules.d/70-persistent-net.rules
        state: absent
      when: "ansible_os_family == 'RedHat'"

    - name: "Removing RedHat interface persistence (step 2)."
      ansible.builtin.lineinfile:
        dest: /etc/sysconfig/network-scripts/ifcfg-eth0
        regexp: "{{ item }}"
        state: absent
      when: "ansible_os_family == 'RedHat'"
      with_items:
        - ^HWADDR
        - ^UUID
