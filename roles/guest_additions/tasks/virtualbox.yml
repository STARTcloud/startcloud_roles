---
- name: "Resolving the Packer build user for guest additions artifacts"
  ansible.builtin.set_fact:
    guest_additions_user: "{{ guest_additions_user | default(vagrant_user | default(service_user | default('startcloud'))) }}"

- name: "Checking for the Packer .vbox_version marker"
  ansible.builtin.stat:
    path: "/home/{{ guest_additions_user }}/.vbox_version"
  register: vbox_version_marker

- name: "Skipping guest additions build (no Packer-uploaded ISO on this machine)"
  ansible.builtin.debug:
    msg: "/home/{{ guest_additions_user }}/.vbox_version not found; the guest additions install only runs during Packer box builds."
  when: not vbox_version_marker.stat.exists

- name: "Installing VirtualBox guest additions"
  when: vbox_version_marker.stat.exists
  block:
    - name: "Getting VirtualBox version."
      changed_when: false
      ansible.builtin.command: "cat /home/{{ guest_additions_user }}/.vbox_version"
      register: virtualbox_version

    - name: "Mounting VirtualBox guest additions ISO."
      ansible.posix.mount:
        fstype: iso9660
        name: /tmp/vbox
        opts: loop
        src: "/home/{{ guest_additions_user }}/VBoxGuestAdditions_{{ virtualbox_version.stdout }}.iso"
        state: mounted

    - name: "Running VirtualBox guest additions installation."
      changed_when: true
      failed_when: false
      ansible.builtin.command: "sh /tmp/vbox/VBoxLinuxAdditions.run"

    - name: "Unmounting VirtualBox guest additions ISO."
      ansible.posix.mount:
        fstype: iso9660
        name: /tmp/vbox
        src: "/home/{{ guest_additions_user }}/VBoxGuestAdditions_{{ virtualbox_version.stdout }}.iso"
        state: absent

    - name: "Deleting VirtualBox guest additions ISO."
      ansible.builtin.file:
        path: "/home/{{ guest_additions_user }}/VBoxGuestAdditions_{{ virtualbox_version.stdout }}.iso"
        state: absent
