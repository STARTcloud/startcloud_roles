---
argument_specs:
  main:
    short_description: Configure an IPA server for Smart Card authentication
    description:
      - Configures an existing IPA server (master or replica) for Smart Card authentication by uploading CA certificates, enabling OCSP and PKINIT, and preparing SSSD for smart card login.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      ipaserver_install_packages:
        type: bool
        default: true
        description: When true, install the bind utilities packages required for DNS resolution checks.
