---
- name: "Block to Allow Loading of Variables without running task"
  when: run_tasks
  block:
    - name: "Installing openfortivpn Packages"
      ansible.builtin.apt:
        name: "{{ openfortivpn_packages }}"
        state: present
        update_cache: true

    - name: "Creating openfortivpn Configuration Directory"
      ansible.builtin.file:
        path: "/etc/openfortivpn"
        state: directory
        owner: "root"
        group: "root"
        mode: "0750"

    - name: "Rendering openfortivpn Client Configuration"
      ansible.builtin.template:
        src: "client.conf.j2"
        dest: "/etc/openfortivpn/config"
        owner: "root"
        group: "root"
        mode: "0600"
      notify: "Restarting openfortivpn"

    - name: "Deploying openfortivpn systemd Service Unit"
      ansible.builtin.template:
        src: "openfortivpn.service.j2"
        dest: "/etc/systemd/system/openfortivpn.service"
        owner: "root"
        group: "root"
        mode: "0644"
      notify: "Reloading systemd Daemon"
      when: openfortivpn_enable_service

    - name: "Enabling and Starting openfortivpn Service"
      ansible.builtin.systemd_service:
        name: "openfortivpn.service"
        enabled: true
        state: started
        daemon_reload: true
      when: openfortivpn_enable_service
