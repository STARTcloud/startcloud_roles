argument_specs:
  main:
    short_description: Configures an OmniOS Kayak PXE autoinstaller server.
    description:
      - Installs Kayak, TFTP, and ISC DHCP and lays down the PXE boot, DHCP, and Kayak XML/AI configuration needed to network-install OmniOS hosts.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
