---
argument_specs:
  main:
    short_description: Install system stress-testing packages
    description:
      - Installs system stress-testing and benchmarking tools (stress-ng, stress, fio) on Debian-family hosts.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      show_help:
        type: bool
        default: true
        description: Whether to display informational help output for the role.
      vm_encrypted:
        type: bool
        default: false
        description: Whether the target VM is encrypted.
      stress_packages:
        type: list
        elements: str
        description: List of stress-testing and benchmarking packages to install.
