---
galaxy_info:
  role_name: startcloud_theme
  author: Mark Gilbert
  description: Applies STARTcloud branding - Plymouth boot splash, GRUB background and GDM login theme on Debian/Ubuntu, and desktop/lock-screen wallpaper on Windows.
  company: STARTcloud
  issue_tracker_url: https://github.com/STARTcloud/startcloud_roles/issues
  license: Apache-2.0
  min_ansible_version: "2.15"
  platforms:
    - name: Debian
      versions: ["bookworm", "trixie"]
    - name: Ubuntu
      versions: ["jammy", "noble"]
    - name: Windows
      versions: ["2022"]
  galaxy_tags:
    - theme
    - plymouth
    - grub
    - wallpaper
    - branding
dependencies:
  - role: startcloud.startcloud_roles.serial
collections:
  - startcloud.startcloud_roles
