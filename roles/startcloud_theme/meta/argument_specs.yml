---
argument_specs:
  main:
    short_description: Apply STARTcloud system branding and theme
    description:
      - Deploys STARTcloud branding assets - Plymouth boot splash, GRUB
        background and GDM login theme on Debian/Ubuntu, and desktop and
        lock-screen wallpaper plus taskbar/Start-menu tweaks on Windows.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate - when false the role loads its vars but runs no tasks.
      vm_type:
        type: str
        default: server
        description: Deployment profile - 'desktop' also configures the GDM login screen and screensaver, 'server' skips those.
      theme_packages:
        type: list
        elements: str
        description: APT packages providing Plymouth theming support installed on Debian/Ubuntu.
