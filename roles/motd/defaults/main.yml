---
run_tasks: true

motd_remove_default_config: false
motd_restore_default_config: false
motd_add_footer: false
motd_add_update: false
# Support/contact box on login is optional; the same branding is shown in the
# banner and the full detail lives in the `sysinfo` command, so default it off
# to keep the login short.
motd_show_support: false
motd_org: STARTcloud
motd_sysadmins_signature: Random system administrators
motd_sysadmins_email: "{{ email | default('support@startcloud.com') }}"

# ANSI color codes (16-color only, no truecolor — "38;2;r;g;b" renders wrong on
# macOS Terminal.app, over VNC and on older PuTTY). Secondary is bold with NO
# hardcoded foreground so emphasis stays readable on light AND dark backgrounds.
motd_color_primary: "0;32"
motd_color_secondary: "1"

# Banner components (vendor-overridable)
motd_banner_managed_line: >-
  echo -e "${G}┃${R}                  This system is managed by ${G}START${W}cloud${R}                     ${G}┃${R}"
motd_banner_art: |
  echo -e "${G}┃${R}          ${G}______________    ____  ______${W}     __                __${R}          ${G}┃${R}"
  echo -e "${G}┃${R}         ${G}/ ___/_  __/   |  / __ \\/_  __/${W}____/ /___  __  ______/ /${R}          ${G}┃${R}"
  echo -e "${G}┃${R}         ${G}\\__ \\ / / / /| | / /_/ / / / ${W}/ ___/ / __ \\/ / / / __  /${R}           ${G}┃${R}"
  echo -e "${G}┃${R}        ${G}___/ // / / ___ |/ _, _/ / / ${W}/ /__/ / /_/ / /_/ / /_/ /${R}            ${G}┃${R}"
  echo -e "${G}┃${R}       ${G}/____//_/ /_/  |_/_/ |_| /_/ ${W} \\___/_/\\____/\\__,_/\\__,_/${R}             ${G}┃${R}"
motd_banner_tagline: >-
  echo -e "${G}┃${R}                            ${W}OWN YOUR DATA${R}                                  ${G}┃${R}"

motd_content: ""
