---
# FreeBSD / OPNsense motd — static /etc/motd only.
# OPNsense's web UI / console banner is produced elsewhere; this just gives
# SSH logins a branded footer. We skip update-motd.d (Linux only), /etc/issue
# editing (OPNsense owns its console banner), and the sshd_config PrintMotd
# tweak (OPNsense manages sshd via config.xml, not /etc/ssh/sshd_config).

-
  name: "Loading vendor-specific variables"
  ansible.builtin.include_vars: "{{ vendor }}.yml"
  when: vendor is defined
  failed_when: false

-
  name: "Writing static /etc/motd"
  ansible.builtin.template:
    src: etc/motd.freebsd.j2
    dest: /etc/motd
    mode: '0644'
