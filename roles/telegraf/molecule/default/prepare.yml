---
- hosts: telegraf
  tasks:
    - name: "Installing packages on CentOS"
      ansible.builtin.dnf:
        name: which
        state: present
      when:
        - ansible_os_family == 'RedHat'

    - name: "Installing packages on Debian"
      ansible.builtin.apt:
        name:
          - wget
          # - gpg
        state: present
      when:
        - ansible_os_family == 'Debian'

    - name: "Installing packages on Suse"
      community.general.zypper:
        name:
          - sysvinit-tools
          - insserv-compat
          - aaa_base
        state: present
      when:
        - ansible_os_family == 'Suse'
