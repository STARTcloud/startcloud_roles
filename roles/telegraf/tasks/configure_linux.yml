---
- name: "Retrieving ec2 facts"
  amazon.aws.ec2_metadata_facts:
  when:
    - telegraf_agent_aws_tags

- name: "Adding prefix path"
  ansible.builtin.set_fact:
    telegraf_agent_config_path: /usr/local/etc
  when:
    - ansible_os_family == "FreeBSD"

- name: "Retrieving all ec2 tags on the instance"
  amazon.aws.ec2_tag:
    region: "{{ ansible_ec2_placement_region }}"
    resource: "{{ ansible_ec2_instance_id }}"
    state: list
  when:
    - telegraf_agent_aws_tags
  register: ec2_tags

- name: "Copying the template for versions < 0.10.0"
  ansible.builtin.template:
    src: etc-opt-telegraf-telegraf.conf.j2
    dest: /etc/opt/telegraf/telegraf.conf
    owner: telegraf
    group: telegraf
    mode: "0640"
  become: true
  when:
    - telegraf_agent_version is version_compare('0.10.0', '<')
  notify:
    - "Restarting Telegraf"
    - "Restarting Telegraf Container"

- name: "Copying the template for versions >= 0.10.0"
  ansible.builtin.template:
    src: telegraf.conf.j2
    dest: "{{ telegraf_agent_config_path }}/telegraf.conf"
    owner: telegraf
    group: telegraf
    mode: "0640"
  become: true
  when:
    - telegraf_agent_version is version_compare('0.10.0', '>=')
  notify:
    - "Restarting Telegraf"
    - "Restarting Telegraf Container"

- name: "Checking if extra plugins directory exists in case of exclusive"
  ansible.builtin.stat:
    path: "{{ telegraf_agent_config_path }}/telegraf.d"
  register: telegraf_directory
  when:
    - telegraf_plugins_extra_exclusive

- name: "Deleting telegraf extra plugin path"
  ansible.builtin.file:
    state: absent
    path: "{{ telegraf_agent_config_path }}/telegraf.d/"
  when:
    - telegraf_plugins_extra_exclusive
    - telegraf_directory.stat.exists
  become: true
  notify:
    - "Restarting Telegraf"
    - "Restarting Telegraf Container"

- name: "Creating telegraf extra plugin path"
  ansible.builtin.file:
    state: directory
    path: "{{ telegraf_agent_config_path }}/telegraf.d/"
    owner: telegraf
    group: telegraf
    mode: "0755"
  when:
    - telegraf_plugins_extra_exclusive
    - telegraf_directory.stat.exists
  become: true
  notify:
    - "Restarting Telegraf"
    - "Restarting Telegraf Container"

- name: "Copying telegraf extra plugins"
  ansible.builtin.template:
    src: "telegraf-extra-plugin.conf.j2"
    dest: "{{ telegraf_agent_config_path }}/telegraf.d/{{ item.key }}.conf"
    owner: telegraf
    group: telegraf
    mode: "0640"
  with_dict: "{{ telegraf_plugins_extra }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - telegraf_plugins_extra is defined
    - telegraf_plugins_extra is iterable
    - item.value.state|default('present') != 'absent'
  become: true
  notify:
    - "Restarting Telegraf"
    - "Restarting Telegraf Container"

- name: "Removing telegraf extra plugins"
  ansible.builtin.file:
    path: "{{ telegraf_agent_config_path }}/telegraf.d/{{ item.key }}.conf"
    state: absent
  with_dict: "{{ telegraf_plugins_extra }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - telegraf_plugins_extra is defined
    - telegraf_plugins_extra is iterable
    - item.value.state|default('present') == 'absent'
  become: true
  notify:
    - "Restarting Telegraf"
    - "Restarting Telegraf Container"

- name: "Forcing restart service after reread config"
  ansible.builtin.meta: flush_handlers

- name: "Starting Telegraf (if it wasn't running)"
  ansible.builtin.service:
    name: telegraf
    state: "{{ telegraf_enabled | ternary('started', 'stopped') }}"
    enabled: "{{ telegraf_enabled }}"
  become: true
  when: not telegraf_agent_docker

- name: "Configuring system for docker plugin"
  when: "'docker' in telegraf_plugins_extra and not telegraf_agent_docker"

  block:
    - name: "Adding telegraf user to docker group"
      ansible.builtin.user:
        name: telegraf
        groups: docker
        append: true
      become: true
      notify:
        - "Restarting Telegraf"
- name: "Configuring system for smart plugin"
  when: "'smart' in telegraf_plugins_extra and not telegraf_agent_docker"

  block:
    - name: "Installing smartmontools"
      become: true
      ansible.builtin.package:
        name: smartmontools

    - name: "Finding path of smartctl"
      ansible.builtin.shell: which smartctl
      register: which_smartctl
      ignore_errors: true
      changed_when: false
      become: true

    - name: "Ensuring telegraf user can execute smartctl"
      ansible.builtin.blockinfile:
        marker: "# {mark} ANSIBLE MANAGED BLOCK (Ensure telegraf user can execute smartctl)"
        dest: "/etc/sudoers.d/telegraf"
        block: "telegraf ALL=(root) NOPASSWD: {{ which_smartctl.stdout }}"
        create: true
      become: true
      notify:
        - "Restarting Telegraf"
- name: "Configuring system for sensors plugin"
  when: "'sensors' in telegraf_plugins_extra and not telegraf_agent_docker"
  block:
    - name: "Debian | Installing lm-sensors"
      ansible.builtin.package:
        name: lm-sensors
      become: true
      notify:
        - "Restarting Telegraf"
      when: ansible_os_family == "Debian"

    - name: "RedHat | Installing lm-sensors"
      ansible.builtin.package:
        name: lm_sensors
      become: true
      notify:
        - "Restarting Telegraf"
      when: ansible_os_family == "RedHat"
