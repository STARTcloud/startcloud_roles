---
- name: "Retrieving ec2 facts"
  amazon.aws.ec2_metadata_facts:
  when:
    - telegraf_agent_aws_tags

- name: "Adding prefix path"
  ansible.builtin.set_fact:
    telegraf_agent_config_path: /usr/local/etc
  when:
    - ansible_os_family in ["FreeBSD", "Darwin"]

- name: "Retrieving all ec2 tags on the instance"
  amazon.aws.ec2_tag:
    region: "{{ ansible_ec2_placement_region }}"
    resource: "{{ ansible_ec2_instance_id }}"
    state: list
  when:
    - telegraf_agent_aws_tags
  register: ec2_tags

- name: "Copying the template for versions < 0.10.0"
  ansible.builtin.template:
    src: etc-opt-telegraf-telegraf.conf.j2
    dest: /etc/opt/telegraf/telegraf.conf
    owner: "{{ telegraf_mac_user }}"
    group: "{{ telegraf_mac_group }}"
    mode: "0640"
  become: true
  when:
    - telegraf_agent_version is version_compare('0.10.0', '<')
  notify:
    - "Restarting Telegraf"
    - "Restarting Telegraf Container"

- name: "Copying the template for versions >= 0.10.0"
  ansible.builtin.template:
    src: telegraf.conf.j2
    dest: "{{ telegraf_agent_config_path }}/telegraf.conf"
    owner: "{{ telegraf_mac_user }}"
    group: "{{ telegraf_mac_group }}"
    mode: "0640"
  become: true
  when:
    - telegraf_agent_version is version_compare('0.10.0', '>=')
  notify:
    - "Restarting MacOS Telegraf"
    - "Restarting Telegraf Container"

- name: "Checking if extra plugins directory exists in case of exclusive"
  ansible.builtin.stat:
    path: "{{ telegraf_agent_config_path }}/telegraf.d"
  register: telegraf_directory
  when:
    - telegraf_plugins_extra_exclusive

- name: "Deleting telegraf extra plugin path"
  ansible.builtin.file:
    state: absent
    path: "{{ telegraf_agent_config_path }}/telegraf.d/"
  when:
    - telegraf_plugins_extra_exclusive
    - telegraf_directory.stat.exists
  become: true
  notify:
    - "Restarting MacOS Telegraf"
    - "Restarting Telegraf Container"

- name: "Creating telegraf extra plugin path"
  ansible.builtin.file:
    state: directory
    path: "{{ telegraf_agent_config_path }}/telegraf.d/"
    owner: "{{ telegraf_mac_user }}"
    group: "{{ telegraf_mac_group }}"
    mode: "0755"
  when:
    - telegraf_plugins_extra_exclusive
    - telegraf_directory.stat.exists
  become: true
  notify:
    - "Restarting MacOS Telegraf"
    - "Restarting Telegraf Container"

- name: "Copying telegraf extra plugins"
  ansible.builtin.template:
    src: "telegraf-extra-plugin.conf.j2"
    dest: "{{ telegraf_agent_config_path }}/telegraf.d/{{ item.key }}.conf"
    owner: "{{ telegraf_mac_user }}"
    group: "{{ telegraf_mac_group }}"
    mode: "0640"
  with_dict: "{{ telegraf_plugins_extra }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - telegraf_plugins_extra is defined
    - telegraf_plugins_extra is iterable
    - item.value.state|default('present') != 'absent'
  become: true
  notify:
    - "Restarting MacOS Telegraf"
    - "Restarting Telegraf Container"

- name: "Removing telegraf extra plugins"
  ansible.builtin.file:
    path: "{{ telegraf_agent_config_path }}/telegraf.d/{{ item.key }}.conf"
    state: absent
  with_dict: "{{ telegraf_plugins_extra }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - telegraf_plugins_extra is defined
    - telegraf_plugins_extra is iterable
    - item.value.state|default('present') == 'absent'
  become: true
  notify:
    - "Restarting MacOS Telegraf"
    - "Restarting Telegraf Container"

- name: "Forcing restart service after reread config"
  ansible.builtin.meta: flush_handlers

- name: "Starting Telegraf (if it wasn't running)"
  ansible.builtin.command: brew services start telegraf
  register: brew_services_start_telegraf
  changed_when: '"Successfully started `telegraf`" in brew_services_start_telegraf.stdout'
  when: not telegraf_agent_docker
