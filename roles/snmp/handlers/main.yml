---
- name: restart snmp
  become: true
  ansible.builtin.service:
    name: "{{ snmp_service_name }}"
    state: restarted

- name: enabled snmp
  become: true
  ansible.builtin.service:
    name: "{{ snmp_service_name }}"
    enabled: true

- name: start snmp
  become: true
  ansible.builtin.service:
    name: "{{ snmp_service_name }}"
    state: started
