---
-
  name: "Restarting MongoDB"
  ansible.builtin.systemd:
    name: mongod
    state: restarted

-
  name: "Restarting OpenSearch"
  ansible.builtin.systemd:
    name: opensearch
    state: restarted

-
  name: "Restarting Graylog"
  ansible.builtin.systemd:
    name: graylog-server
    state: restarted
