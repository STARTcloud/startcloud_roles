---
-
  name: "Block to Allow Loading of Variables without running task"
  when: run_tasks
  block:
    -
      name: "Setting up Debian Installations"
      when: "ansible_os_family == 'Debian'"
      block:
        -
          name: "Gathering DEB architecture"
          ansible.builtin.command: dpkg --print-architecture
          register: deb_architecture
          changed_when: false

        -
          name: "Printing DEB architecture"
          ansible.builtin.debug:
            msg: "deb_architecture.stdout: {{ deb_architecture.stdout }}"

        -
          name: "Ensuring apt cache is updated"
          ansible.builtin.apt:
            cache_valid_time: 3600
            update_cache: true

        -
          name: "Installing Prerequisite Packages"
          ansible.builtin.apt:
            name: "{{ graylog_packages }}"
            state: present

        -
          name: "Installing MongoDB Metadata Store"
          ansible.builtin.include_tasks: mongodb.yml

        -
          name: "Installing OpenSearch Search Backend"
          ansible.builtin.include_tasks: opensearch.yml

        -
          name: "Installing Graylog Server"
          ansible.builtin.include_tasks: graylog.yml
