---
argument_specs:
  main:
    short_description: Grafana installation and configuration
    description:
      - Installs Grafana from the official Grafana OSS APT repository and renders /etc/grafana/grafana.ini.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      grafana_packages:
        type: list
        elements: str
        description: Packages installed before configuring Grafana (defaults to the grafana package).
