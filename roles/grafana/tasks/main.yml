---
- name: "Block to Allow Loading of Variables without running task"
  when: run_tasks
  block:
    - name: "Setting up Debian Installations"
      when: "ansible_os_family == 'Debian'"
      block:
        - name: "Gathering DEB architecture"
          ansible.builtin.command: dpkg --print-architecture
          register: deb_architecture
          changed_when: false

        - name: "Printing DEB architecture"
          ansible.builtin.debug:
            msg: "deb_architecture.stdout: {{ deb_architecture.stdout }}"

        - name: "Ensuring apt cache is updated"
          ansible.builtin.apt:
            cache_valid_time: 3600
            update_cache: true

        - name: "Upgrading all apt packages"
          ansible.builtin.apt:
            upgrade: dist
            update_cache: true

        - name: "Adding Additional Dependencies {{ grafana_packages }}"
          ansible.builtin.apt:
            name: "{{ grafana_packages }}"
            state: present

        - name: "Downloading Grafana GPG key"
          ansible.builtin.get_url:
            url: "https://packages.grafana.com/gpg.key"
            dest: "/usr/share/keyrings/grafana.key"
            mode: "0644"

        - name: "Adding Grafana APT repository"
          ansible.builtin.apt_repository:
            repo: "deb [signed-by=/usr/share/keyrings/grafana.key] https://packages.grafana.com/oss/deb stable main"
            state: present

        - name: "Updating APT cache"
          ansible.builtin.apt:
            update_cache: true

        - name: "Installing Grafana"
          ansible.builtin.apt:
            name: grafana
            state: present

        - name: "Configuring Grafana"
          ansible.builtin.template:
            src: grafana.ini.j2
            dest: /etc/grafana/grafana.ini
            mode: "0644"
          notify: Restarting Grafana
