---
argument_specs:
  main:
    short_description: Install utility packages on Debian-family systems
    description:
      - Updates the apt cache, upgrades installed apt packages, and installs a configured list of system utility and Python packages on Debian-family hosts.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      packages:
        type: list
        elements: str
        description: The list of apt packages to install on Debian-family systems.
