---
-
  name: "Block to Allow Loading of Variables without running task"
  when: run_tasks
  block:
    -
      name: "Installing Remmina on Debian-family systems"
      when: "ansible_os_family == 'Debian'"
      block:
        -
          name: "Ensuring apt cache is updated"
          ansible.builtin.apt:
            cache_valid_time: 3600
            update_cache: true

        -
          name: "Installing Remmina remote desktop client and plugins"
          ansible.builtin.apt:
            name: "{{ remmina_packages }}"
            state: present
