---
argument_specs:
  main:
    short_description: Installs the Remmina remote desktop client.
    description:
      - Installs the Remmina remote desktop client and a set of protocol plugins (RDP, VNC, SPICE, secret storage) on Debian-family systems via apt.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      remmina_packages:
        type: list
        elements: str
        default:
          - remmina
          - remmina-plugin-rdp
          - remmina-plugin-vnc
          - remmina-plugin-secret
          - remmina-plugin-spice
        description: List of Remmina apt packages (client plus protocol plugins) to install.
