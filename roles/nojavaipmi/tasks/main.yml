---
- name: "Block to Allow Loading of Variables without running task"
  when: run_tasks
  block:
    - name: "Installing Java-free IPMI console tools on Debian"
      when: "ansible_os_family == 'Debian'"
      block:
        - name: "Ensuring apt cache is updated"
          ansible.builtin.apt:
            cache_valid_time: 3600
            update_cache: true

        - name: "Installing Java-free IPMI console packages {{ packages }}"
          ansible.builtin.apt:
            name: "{{ packages }}"
            state: present
