---
argument_specs:
  main:
    short_description: Configure a FreeIPA client for Smart Card authentication.
    description:
      - Configures an already-enrolled FreeIPA client for Smart Card authentication.
      - Installs the required packages, uploads and validates the smartcard CA
        certificates, and enables smartcard login via authselect or authconfig.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      ipaclient_install_packages:
        type: bool
        default: true
        description: Whether the client packages required for smartcard support should be installed.
