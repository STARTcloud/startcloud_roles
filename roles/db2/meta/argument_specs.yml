---
argument_specs:
  main:
    short_description: IBM DB2 installation with HADR and TSAMP
    description:
      - Installs IBM DB2 11.1 from the server_t installer, creates the database, and configures HADR primary/standby replication plus TSAMP clustering. Additional variables (db2usr, db2grp, db2version, db2dbname, database_dir, HADR hosts/ports) are supplied externally by the calling play.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
