---
- name: "Updating System"
  ansible.builtin.dnf:
    name: "*"
    state: latest
- name: "Installing the 'Development tools' package group"
  ansible.builtin.dnf:
    name: "@Development tools"
    state: present
- name: "Installing Dependencies"
  vars:
    packages:
      - libstdc++-devel
      - libaio
      - pam-devel.i686
  ansible.builtin.dnf:
    name: "{{ packages }}"
- name: "Disabling SELinux"
  ansible.posix.selinux:
    state: disabled
- name: "Ensuring Group: {{ db2grp }} exists"
  ansible.builtin.group:
    name: "{{ db2grp }}"
    state: present
- name: "Adding User: {{ db2usr }}"
  ansible.builtin.user:
    comment: "DB2 User"
    group: "{{ db2grp }}"
    name: "{{ db2usr }}"
- name: "Checking if /local data directory is mounted and writeable by user: {{ db2usr }}"
  ansible.builtin.file:
    group: "{{ db2grp }}"
    mode: "0755"
    owner: "{{ db2usr }}"
    path: /local
    state: directory
  register: local_exists
- name: "Checking if /local/{{ database_dir }} data directory is mounted and writeable by user: {{ db2usr }}"
  ansible.builtin.file:
    group: "{{ db2grp }}"
    mode: "0755"
    owner: "{{ db2usr }}"
    path: "/local/{{ database_dir }}"
    state: directory
- name: "Checking if /local/backup data directory is mounted and writeable by user: {{ db2usr }}"
  ansible.builtin.file:
    group: "{{ db2grp }}"
    mode: "0755"
    owner: "{{ db2usr }}"
    path: /local/backup
    state: directory
- name: "Checking if /local-log directory is mounted and writeable by user: {{ db2usr }}"
  ansible.builtin.file:
    group: "{{ db2grp }}"
    mode: "0755"
    owner: "{{ db2usr }}"
    path: /local-log
    state: directory
  register: local_log_exists
- name: "Checking if /local/server_t exists to skip extraction if already extracted: {{ db2usr }}"
  register: server_t_exists
  ansible.builtin.stat:
    path: /local/server_t
- name: "Downloading DB2 Installer Version: {{ db2version }}"
  ansible.builtin.get_url:
    dest: /local/v11.1.4fp5_linuxx64_server_t.tar.gz
    url: "https://www./v11.1.4fp5_linuxx64_server_t.tar.gz"
  when: "server_t_exists.stat.exists is not defined or not server_t_exists.stat.exists"
- name: "Extracting DB2 Installer Version: {{ db2version }} to /local/server_t"
  ansible.builtin.unarchive:
    dest: /local/
    src: /local/v11.1.4fp5_linuxx64_server_t.tar.gz
  when: "server_t_exists.stat.exists is not defined or not server_t_exists.stat.exists"
- name: "Checking if DB2 is Already Installed"
  block:
    - name: "Checking Command"
      ansible.builtin.raw: "su - {{ db2usr }} -c 'db2licm -l'"
      register: db2_installed
  rescue:
    - name: "Checking Pre-Requisites for DB2 Version: {{ db2version }}"
      become_user: db2inst1
      ansible.builtin.shell: "/local/server_t/db2prereqcheck -v {{ db2version }} -c"
    - name: "Creating Response File for Automated DB2 Version: {{ db2version }} installation"
      ansible.builtin.blockinfile:
        block: "PROD = DB2_SERVER_EDITION\nFILE  = /opt/ibm/db2/V11.1\nLIC_AGREEMENT  = ACCEPT\nDB2_INST.START_DURING_INSTALL = YES\nDB2_INST.AUTOSTART = YES\nINSTALL_TYPE = TYPICAL\nINSTANCE = DB2_INST\n
          DB2_INST.NAME = {{ db2usr }}\nDB2_INST.GROUP_NAME =  {{ db2grp }} \n"
        create: true
        path: /local/server_t/db2server.rsp
    - name: "Installing DB2 version: {{ db2version }} response file"
      ansible.builtin.shell: "/local/server_t/db2setup -r /local/server_t/db2server.rsp"
- name: "Stopping the Service"
  ansible.builtin.raw: "su - {{ db2usr }} -c 'db2stop'"
- name: "Starting the Service"
  ansible.builtin.raw: "su - {{ db2usr }} -c 'db2start'"
- name: "Checking Licensing"
  ansible.builtin.raw: "su - {{ db2usr }} -c 'db2licm -l'"
- name: "Checking if /local/backup data directory already exists"
  register: local_backup_exists
  ansible.builtin.stat:
    path: /local/backup
- name: "Removing Previous Backups"
  ansible.builtin.file:
    path: /local/backup
    state: absent
  when: "local_backup_exists.stat.exists is defined and local_backup_exists.stat.exists"
- name: "Creating new Backup folder"
  ansible.builtin.file:
    group: "{{ db2grp }}"
    owner: "{{ db2usr }}"
    path: /local/backup
    state: directory
