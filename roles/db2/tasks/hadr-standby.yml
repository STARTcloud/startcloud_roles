---
- name: "Transferring initial backup from the HADR primary"
  ansible.posix.synchronize:
    delete: true
    dest: /local/
    src: /local/backup

- name: "Setting DB2COMM to TCPIP"
  ansible.builtin.command: "su - {{ db2usr }} -c 'db2set DB2COMM=TCPIP'"
  changed_when: true

- name: "Stopping DB2"
  ansible.builtin.command: "su - {{ db2usr }} -c 'db2stop force'"
  changed_when: true

- name: "Starting DB2"
  ansible.builtin.command: "su - {{ db2usr }} -c 'db2start'"
  changed_when: true

- name: "Restoring the database from backup: {{ db2dbname }}"
  ansible.builtin.command: "su - {{ db2usr }} -c 'db2 restore db {{ db2dbname }} from /local/backup on /local/{{ database_dir }}'"
  changed_when: true

- name: "Setting HADR_LOCAL_HOST to {{ db2_b_hadr_host }}"
  ansible.builtin.command: "su - {{ db2usr }} -c 'db2 update db cfg for {{ db2dbname }} using HADR_LOCAL_HOST {{ db2_b_hadr_host }}'"
  changed_when: true

- name: "Setting HADR_LOCAL_SVC to {{ db2_hadr_backend_ports }}"
  ansible.builtin.command: "su - {{ db2usr }} -c 'db2 update db cfg for {{ db2dbname }} using HADR_LOCAL_SVC {{ db2_hadr_backend_ports }}'"
  changed_when: true

- name: "Setting HADR_REMOTE_HOST to {{ db2_a_hadr_host }}"
  ansible.builtin.command: "su - {{ db2usr }} -c 'db2 update db cfg for {{ db2dbname }} using HADR_REMOTE_HOST {{ db2_a_hadr_host }}'"
  changed_when: true

- name: "Setting HADR_REMOTE_SVC to {{ db2_a_hadr_port }}"
  ansible.builtin.command: "su - {{ db2usr }} -c 'db2 update db cfg for {{ db2dbname }} using HADR_REMOTE_SVC {{ db2_a_hadr_port }}'"
  changed_when: true

- name: "Setting HADR_REMOTE_INST to {{ db2usr }}"
  ansible.builtin.command: "su - {{ db2usr }} -c 'db2 update db cfg for {{ db2dbname }} using HADR_REMOTE_INST {{ db2usr }}'"
  changed_when: true

- name: "Starting HADR as standby on: {{ db2dbname }}"
  ansible.builtin.command: "su - {{ db2usr }} -c 'db2 start hadr on db {{ db2dbname }} as standby'"
  changed_when: true
