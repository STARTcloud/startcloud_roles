---
- name: "Enabling the HADR replication port {{ db2_hadr_backend_ports }}"
  ansible.posix.firewalld:
    port: "{{ db2_hadr_backend_ports }}/tcp"
    permanent: true
    state: enabled

- name: "Creating the backup Directory"
  ansible.builtin.file:
    group: "{{ db2grp }}"
    mode: "0777"
    owner: "{{ db2usr }}"
    path: "/local/backup"
    state: directory

- name: "Forcing DB2 Server Off"
  ansible.builtin.command: "su - {{ db2usr }} -c 'db2stop force'"
  changed_when: true

- name: "Starting DB2 Server"
  ansible.builtin.command: "su - {{ db2usr }} -c 'db2start'"
  changed_when: true

- name: "Creating Dummy Backup"
  ansible.builtin.command: "su - {{ db2usr }} -c 'db2 backup db {{ db2dbname }} to /dev/null'"
  changed_when: true

- name: "Setting HADR_LOCAL_HOST to {{ db2_a_hadr_host }}"
  ansible.builtin.command: "su - {{ db2usr }} -c 'db2 update db cfg for {{ db2dbname }} using HADR_LOCAL_HOST {{ db2_a_hadr_host }}'"
  changed_when: true

- name: "Setting HADR_LOCAL_SVC to {{ db2_hadr_backend_ports }}"
  ansible.builtin.command: "su - {{ db2usr }} -c 'db2 update db cfg for {{ db2dbname }} using HADR_LOCAL_SVC {{ db2_hadr_backend_ports }}'"
  changed_when: true

- name: "Setting HADR_REMOTE_HOST to {{ db2_b_hadr_host }}"
  ansible.builtin.command: "su - {{ db2usr }} -c 'db2 update db cfg for {{ db2dbname }} using HADR_REMOTE_HOST {{ db2_b_hadr_host }}'"
  changed_when: true

- name: "Setting HADR_REMOTE_SVC to {{ db2_b_hadr_port }}"
  ansible.builtin.command: "su - {{ db2usr }} -c 'db2 update db cfg for {{ db2dbname }} using HADR_REMOTE_SVC {{ db2_b_hadr_port }}'"
  changed_when: true

- name: "Setting HADR_REMOTE_INST to {{ db2usr }}"
  ansible.builtin.command: "su - {{ db2usr }} -c 'db2 update db cfg for {{ db2dbname }} using HADR_REMOTE_INST {{ db2usr }}'"
  changed_when: true

- name: "Setting LOGINDEXBUILD ON"
  ansible.builtin.command: "su - {{ db2usr }} -c 'db2 update db cfg for {{ db2dbname }} using LOGINDEXBUILD on'"
  changed_when: true

- name: "Setting HADR_PEER_WINDOW to {{ peer_window }}"
  ansible.builtin.command: "su - {{ db2usr }} -c 'db2 update db cfg for {{ db2dbname }} using HADR_PEER_WINDOW {{ peer_window }}'"
  changed_when: true

- name: "Creating Backup"
  ansible.builtin.command: "su - {{ db2usr }} -c 'db2 backup db {{ db2dbname }} online to /local/backup'"
  changed_when: true
