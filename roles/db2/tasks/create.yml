---
- name: "Creating the Directory for the Database"
  ansible.builtin.file:
    group: "{{ db2grp }}"
    mode: "0755"
    owner: "{{ db2usr }}"
    path: "/local/{{ database_dir }}"
    state: directory

- name: "Creating DB2 Database: {{ db2dbname }}"
  ansible.builtin.command: "su - {{ db2usr }} -c 'db2 create database {{ db2dbname }} on /local/{{ database_dir }}'"
  register: db2_create_result
  changed_when: db2_create_result.rc == 0
  failed_when: false

- name: "Creating Archive Log Folder /local-log/archive-logs"
  ansible.builtin.file:
    path: /local-log/archive-logs
    state: directory
    mode: "0755"

- name: "Enabling Log Archiving at /local-log/archive-logs for: {{ db2dbname }}"
  ansible.builtin.command: su - {{ db2usr }} -c "db2 update db cfg for {{ db2dbname }} using LOGARCHMETH1 'DISK:/local-log/archive-logs'"
  changed_when: true
