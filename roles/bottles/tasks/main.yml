---
- name: "Block to Allow Loading of Variables without running task"
  when: run_tasks
  block:
    - name: "Adding Bottles from flatpak"
      ansible.builtin.command: "flatpak install --system flathub com.usebottles.bottles -y"
      register: bottles_install
      changed_when: "'app/com.usebottles.bottles' in bottles_install.stdout or 'Installing' in bottles_install.stdout"
