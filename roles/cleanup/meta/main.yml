galaxy_info:
  role_name: cleanup
  author: Mark Gilbert
  description: Cleans up and reduces OS images for Packer template finalization across Debian, RedHat, FreeBSD and Windows.
  company: STARTcloud
  issue_tracker_url: https://github.com/STARTcloud/startcloud_roles/issues
  license: Apache-2.0
  min_ansible_version: '2.15'
  platforms:
    - name: Debian
      versions: ['bookworm', 'trixie']
    - name: Ubuntu
      versions: ['jammy', 'noble']
    - name: EL
      versions: ['8', '9']
    - name: FreeBSD
      versions: ['14.0']
    - name: Windows
      versions: ['2022']
  galaxy_tags:
    - cleanup
    - packer
    - image
    - template
dependencies: []
collections:
  - startcloud.startcloud_roles
