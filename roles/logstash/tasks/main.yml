---
- name: "Block to Allow Loading of Variables without running task"
  when: run_tasks
  block:
    - name: "Adding Elastic APT Signing Key"
      ansible.builtin.get_url:
        url: "{{ logstash_apt_key_url }}"
        dest: "{{ logstash_apt_keyring }}"
        mode: "0644"
      when: ansible_os_family == "Debian"

    - name: "Adding Elastic APT Repository"
      ansible.builtin.apt_repository:
        repo: "{{ logstash_apt_repo }}"
        filename: "elastic-{{ logstash_version }}"
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: "Adding Elastic YUM Repository"
      ansible.builtin.yum_repository:
        name: "elastic-{{ logstash_version }}"
        description: "Elastic repository for {{ logstash_version }} packages"
        baseurl: "{{ logstash_yum_repo_baseurl }}"
        gpgkey: "{{ logstash_yum_gpg_key }}"
        gpgcheck: true
        enabled: true
      when: ansible_os_family == "RedHat"

    - name: "Installing Logstash"
      ansible.builtin.package:
        name: logstash
        state: present

    - name: "Configuring Logstash"
      ansible.builtin.template:
        src: "logstash.yml.j2"
        dest: "{{ logstash_config_dir }}/logstash.yml"
        owner: root
        group: logstash
        mode: "0640"
      notify: "Restarting Logstash"

    - name: "Deploying Logstash Pipeline Configuration"
      ansible.builtin.template:
        src: "pipeline.conf.j2"
        dest: "{{ logstash_pipeline_dir }}/main.conf"
        owner: root
        group: logstash
        mode: "0640"
      notify: "Restarting Logstash"

    - name: "Enabling and Starting Logstash Service"
      ansible.builtin.systemd:
        name: "{{ logstash_service_name }}"
        enabled: "{{ logstash_service_enabled }}"
        state: "{{ logstash_service_state }}"
        daemon_reload: true
