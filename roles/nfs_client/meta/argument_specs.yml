---
argument_specs:
  main:
    short_description: Install NFS client utilities and mount remote shares
    description:
      - Installs NFS client utilities and mounts a list of remote NFS shares, creating each mount point and writing its fstab entry.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      nfs_client_mounts:
        type: list
        elements: dict
        default: []
        description: List of NFS shares to mount; each item requires src and path, with optional fstype, opts, and state keys.
