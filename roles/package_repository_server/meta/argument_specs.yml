---
argument_specs:
  main:
    short_description: Package repository server
    description:
      - Builds and serves OS package repositories — OmniOS IPS pkg server instances and a PGP-signed Debian APT repository.
        Additional structures (pkg_server, storage_disk) are supplied externally by the calling play.
        main.yml always runs the OS base tasks, then the archive tasks selected by pkg_server.type
        (core/extra mirror via pkgrecv, public/private build from source via buildctl).
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      package_server_email:
        type: str
        description: Email address embedded in the generated PGP signing key.
