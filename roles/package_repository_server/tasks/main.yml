---
- name: "Block to Allow Loading of Variables without running task"
  when: run_tasks
  block:
    - name: "Setting OS key for task dispatch"
      ansible.builtin.set_fact:
        pkg_server_os: "{{ 'omnios' if ansible_distribution == 'OmniOS' else ansible_os_family | lower }}"

    - name: "Including OS-specific base tasks"
      ansible.builtin.include_tasks: "{{ pkg_server_os }}-base.yml"

    - name: "Including OS-specific archive tasks"
      ansible.builtin.include_tasks: "{{ pkg_server_os }}-{{ pkg_server.type }}.yml"
      when:
        - pkg_server.type is defined
        - pkg_server.type != 'base'
