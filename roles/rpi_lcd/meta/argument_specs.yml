---
argument_specs:
  main:
    short_description: Drive a Raspberry Pi I2C LCD
    description:
      - Installs the Python GPIO, SMBus, PIL, and luma.lcd dependencies required to drive an HD44780 I2C LCD.
      - Deploys the display scripts and a systemd service that render host, battery (x728 UPS), CPU temperature, IP, and provisioning status.
      - Enables the i2c-dev kernel module on the next reboot for arm64/armhf Debian hosts.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
