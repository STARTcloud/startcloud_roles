---
- name: "Block to Allow Loading of Variables without running task"
  when: run_tasks
  block:
    - name: "Setting up Debian Installations"
      when: "ansible_os_family == 'Debian'"
      block:
        - name: "Creating the authelia system group"
          ansible.builtin.group:
            name: "{{ authelia_group }}"
            system: true
            state: "present"

        - name: "Creating the authelia system user"
          ansible.builtin.user:
            name: "{{ authelia_user }}"
            group: "{{ authelia_group }}"
            shell: "/usr/sbin/nologin"
            home: "{{ authelia_data_dir }}"
            system: true
            create_home: false

        - name: "Creating the Authelia configuration directory"
          ansible.builtin.file:
            path: "{{ authelia_config_dir }}"
            state: "directory"
            owner: "{{ authelia_user }}"
            group: "{{ authelia_group }}"
            mode: "0750"

        - name: "Creating the Authelia data directory"
          ansible.builtin.file:
            path: "{{ authelia_data_dir }}"
            state: "directory"
            owner: "{{ authelia_user }}"
            group: "{{ authelia_group }}"
            mode: "0750"

        - name: "Fetching the Authelia release checksum"
          ansible.builtin.uri:
            url: "{{ authelia_checksum_url }}"
            return_content: true
          register: authelia_checksum_remote
          when: authelia_checksum | length == 0

        - name: "Downloading the Authelia release tarball"
          ansible.builtin.get_url:
            url: "{{ authelia_tarball_url }}"
            dest: "/tmp/{{ authelia_tarball_url | basename }}"
            checksum: "{{ authelia_checksum if authelia_checksum | length > 0 else 'sha256:' ~ (authelia_checksum_remote.content.split() | first) }}"
            mode: "0644"
            timeout: 120

        - name: "Creating the Authelia extraction directory"
          ansible.builtin.file:
            path: "/tmp/authelia-v{{ authelia_version }}"
            state: directory
            mode: "0755"

        - name: "Extracting the Authelia release"
          ansible.builtin.unarchive:
            src: "/tmp/{{ authelia_tarball_url | basename }}"
            dest: "/tmp/authelia-v{{ authelia_version }}"
            remote_src: true
            creates: "/tmp/authelia-v{{ authelia_version }}/authelia-linux-{{ authelia_arch }}"

        - name: "Installing the Authelia binary"
          ansible.builtin.copy:
            src: "/tmp/authelia-v{{ authelia_version }}/authelia-linux-{{ authelia_arch }}"
            dest: "{{ authelia_binary_path }}"
            remote_src: true
            owner: "root"
            group: "root"
            mode: "0755"
          notify: "Restarting Authelia"

        - name: "Rendering the Authelia configuration file"
          ansible.builtin.template:
            src: "configuration.yml.j2"
            dest: "{{ authelia_config_dir }}/configuration.yml"
            owner: "{{ authelia_user }}"
            group: "{{ authelia_group }}"
            mode: "0640"
          notify: "Restarting Authelia"

        - name: "Rendering the Authelia users database"
          ansible.builtin.template:
            src: "users_database.yml.j2"
            dest: "{{ authelia_config_dir }}/users_database.yml"
            owner: "{{ authelia_user }}"
            group: "{{ authelia_group }}"
            mode: "0640"
          notify: "Restarting Authelia"

        - name: "Installing the Authelia systemd unit"
          ansible.builtin.template:
            src: "authelia.service.j2"
            dest: "/etc/systemd/system/authelia.service"
            owner: "root"
            group: "root"
            mode: "0644"
          notify: "Restarting Authelia"

        - name: "Enabling and starting the Authelia service"
          ansible.builtin.systemd:
            name: "authelia"
            state: "started"
            enabled: true
            daemon_reload: true
