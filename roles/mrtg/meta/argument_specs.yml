---
argument_specs:
  main:
    short_description: Installs and configures MRTG.
    description:
      - Installs MRTG and SNMP, renders an MRTG configuration file, generates the
        HTML index, and schedules MRTG to poll SNMP traffic statistics on a single node.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      mrtg_packages:
        type: list
        elements: str
        description: Packages installed to provide MRTG and the SNMP tooling.
      mrtg_config_file:
        type: str
        default: /etc/mrtg.cfg
        description: Path to the MRTG configuration file rendered by the role.
      mrtg_working_directory:
        type: str
        default: /var/www/html/mrtg
        description: Directory where MRTG writes its graphs and HTML index.
      mrtg_snmp_community:
        type: str
        default: public
        description: SNMP community string used to poll the target.
      mrtg_snmp_target:
        type: str
        default: localhost
        description: SNMP target host that MRTG polls for traffic statistics.
      mrtg_refresh_interval:
        type: int
        default: 300
        description: Seconds between browser refreshes of the generated MRTG pages.
      mrtg_run_interval:
        type: str
        default: "*/5"
        description: Cron minute expression controlling how often MRTG polls the target.
