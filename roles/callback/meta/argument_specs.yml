---
argument_specs:
  main:
    short_description: Provisioning-completion callback
    description:
      - Sends an HTTP POST to a tracking URL to report that VM provisioning has completed.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      token:
        type: str
        description: Authentication token included in the callback request body.
      callback_url:
        type: str
        default: https://domain.com/wp-admin/admin-ajax.php
        description: URL the completion callback is POSTed to.
