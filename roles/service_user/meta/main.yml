galaxy_info:
  role_name: service_user
  author: Mark Gilbert
  description: Creates the service user/group with sudo, nofile limits, and home directory across Debian/Ubuntu, RHEL, FreeBSD, and Windows.
  company: STARTcloud
  issue_tracker_url: https://github.com/STARTcloud/startcloud_roles/issues
  license: Apache-2.0
  min_ansible_version: '2.15'
  platforms:
    - name: Debian
      versions: ['bookworm', 'trixie']
    - name: Ubuntu
      versions: ['jammy', 'noble']
    - name: EL
      versions: ['8', '9']
    - name: FreeBSD
      versions: ['13.2', '14.0']
    - name: Windows
      versions: ['2022']
  galaxy_tags:
    - user
    - serviceaccount
    - sudo
    - provisioning
dependencies: []
collections:
  - startcloud.startcloud_roles
