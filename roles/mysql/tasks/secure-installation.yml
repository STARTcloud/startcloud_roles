---
- name: "Ensuring default user is present"
  community.mysql.mysql_user:
    name: "{{ mysql_user_name }}"
    host: "localhost"
    password: "{{ mysql_user_password }}"
    priv: "*.*:ALL,GRANT"
    state: present
  no_log: "{{ mysql_hide_passwords }}"
  when: mysql_user_name != mysql_root_username

# Has to be after the password assignment, for idempotency.
- name: "Copying user-my.cnf file with password credentials"
  ansible.builtin.template:
    src: "user-my.cnf.j2"
    dest: "{{ mysql_user_home }}/.my.cnf"
    owner: "{{ mysql_user_name }}"
    mode: "0600"
  no_log: "{{ mysql_hide_passwords }}"
  when: >
    mysql_user_name != mysql_root_username
    and (mysql_install_packages | bool or mysql_user_password_update)

- name: "Disallowing root login remotely"
  ansible.builtin.command: 'mysql -NBe "{{ item }}"'
  with_items:
    - DELETE FROM mysql.user WHERE User='{{ mysql_root_username }}' AND Host NOT IN ('localhost', '127.0.0.1', '::1')
  changed_when: false

# Recovery-aware: a missing /root/.my.cnf means the root password was never
# persisted (e.g. a previous run died mid-role), so the password set + credentials
# file steps below must run again even though the packages did not change.
- name: "Checking for existing root credentials file"
  ansible.builtin.stat:
    path: "{{ mysql_root_home }}/.my.cnf"
  register: mysql_root_mycnf

- name: "Getting list of hosts for the root user"
  ansible.builtin.command: mysql -NBe "SELECT Host FROM mysql.user WHERE User = '{{ mysql_root_username }}' ORDER BY (Host='localhost') ASC"
  register: mysql_root_hosts
  changed_when: false
  check_mode: false
  when: mysql_install_packages | bool or mysql_root_password_update or not mysql_root_mycnf.stat.exists

# Note: We do not use mysql_user for this operation, as it doesn't always update
# the root password correctly. See: https://goo.gl/MSOejW
# Set root password for MySQL >= 5.7.x (plain IDENTIFIED BY uses each server's
# default auth plugin: native on 5.7, caching_sha2_password on 8.x/9.x — the
# mysql_native_password plugin is disabled in 8.4 and removed in 9.0).
# The auth plugin must be set explicitly: a bare IDENTIFIED BY keeps the current
# plugin, and Oracle debs create root with auth_socket (which ignores passwords).
- name: "Updating MySQL root password for localhost root account (5.7.x and newer)"
  ansible.builtin.shell: >
    mysql -u root -NBe
    "ALTER USER '{{ mysql_root_username }}'@'{{ item }}'
     IDENTIFIED {{ 'WITH caching_sha2_password ' if 'Distrib 5.' not in mysql_cli_version.stdout else '' }}BY '{{ mysql_root_password }}'; FLUSH PRIVILEGES;"
  changed_when: false
  no_log: "{{ mysql_hide_passwords }}"
  with_items: "{{ mysql_root_hosts.stdout_lines | default([]) }}"
  when: >
    ((mysql_install_packages | bool) or mysql_root_password_update or not mysql_root_mycnf.stat.exists)
    and ('Distrib 5.' not in mysql_cli_version.stdout or '5.7.' in mysql_cli_version.stdout)

# Set root password for MySQL < 5.7.x.
- name: "Updating MySQL root password for localhost root account (< 5.7.x)"
  ansible.builtin.shell: >
    mysql -NBe
    'SET PASSWORD FOR "{{ mysql_root_username }}"@"{{ item }}" = PASSWORD("{{ mysql_root_password }}"); FLUSH PRIVILEGES;'
  no_log: "{{ mysql_hide_passwords }}"
  changed_when: false
  with_items: "{{ mysql_root_hosts.stdout_lines | default([]) }}"
  when: >
    ((mysql_install_packages | bool) or mysql_root_password_update or not mysql_root_mycnf.stat.exists)
    and ('Distrib 5.' in mysql_cli_version.stdout and '5.7.' not in mysql_cli_version.stdout)

# Has to be after the root password assignment, for idempotency.
- name: "Copying .my.cnf file with root password credentials"
  ansible.builtin.template:
    src: "root-my.cnf.j2"
    dest: "{{ mysql_root_home }}/.my.cnf"
    owner: root
    group: root
    mode: "0600"
  no_log: "{{ mysql_hide_passwords }}"
  when: mysql_install_packages | bool or mysql_root_password_update or not mysql_root_mycnf.stat.exists

- name: "Getting list of hosts for the anonymous user"
  ansible.builtin.command: mysql -NBe "SELECT Host FROM mysql.user WHERE User = ''"
  register: mysql_anonymous_hosts
  changed_when: false
  check_mode: false

- name: "Removing anonymous MySQL users"
  community.mysql.mysql_user:
    name: ""
    host: "{{ item }}"
    state: absent
  with_items: "{{ mysql_anonymous_hosts.stdout_lines | default([]) }}"

- name: "Removing MySQL test database"
  community.mysql.mysql_db:
    name: "test"
    state: absent
