---
- name: "Ensuring MySQL Python libraries are installed"
  community.general.pacman:
    name: mysql-python
    state: present

- name: "Ensuring MySQL packages are installed"
  community.general.pacman:
    name: "{{ mysql_packages }}"
    state: present
  register: arch_mysql_install_packages

- name: "Running mysql_install_db if MySQL packages were changed"
  ansible.builtin.command: mysql_install_db --user=mysql --basedir=/usr --datadir=/var/lib/mysql
  changed_when: true
  when: arch_mysql_install_packages.changed
