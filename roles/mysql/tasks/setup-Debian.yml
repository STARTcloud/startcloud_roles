---
- name: "Downloading MySQL APT configuration package"
  ansible.builtin.get_url:
    url: "https://repo.mysql.com/mysql-apt-config_{{ mysql_apt_config_version }}_all.deb"
    dest: /tmp/mysql-apt-config.deb
    timeout: 60
    mode: "0644"

- name: "Pre-configuring MySQL APT configuration options"
  ansible.builtin.shell: |
    set -o pipefail
    echo "mysql-apt-config mysql-apt-config/select-server select {{ mysql_apt_series }}" | sudo debconf-set-selections
    echo "mysql-apt-config mysql-apt-config/select-product select Ok" | sudo debconf-set-selections
  args:
    executable: /bin/bash
  changed_when: false

- name: "Checking installed mysql-apt-config version"
  ansible.builtin.shell: "dpkg-query -W -f '${Version}' mysql-apt-config 2>/dev/null || true"
  register: mysql_apt_config_installed
  changed_when: false

# Version-gated instead of "creates: mysql.list" so signing-key refreshes shipped
# in newer mysql-apt-config releases actually get installed on existing machines.
- name: "Installing MySQL APT configuration"
  ansible.builtin.command: dpkg -i /tmp/mysql-apt-config.deb
  changed_when: true
  when: mysql_apt_config_installed.stdout != mysql_apt_config_version
  environment:
    DEBIAN_FRONTEND: noninteractive

# mysql-apt-config bundles a copy of Oracle's signing key that has gone stale
# before (expired 2025-10-22 while still shipping in the latest .deb). Always
# install the live key Oracle publishes instead of trusting the bundled copy.
- name: "Downloading the current MySQL repository signing key"
  ansible.builtin.get_url:
    url: https://repo.mysql.com/RPM-GPG-KEY-mysql-2025
    dest: /tmp/mysql-signing-key.asc
    timeout: 60
    mode: "0644"

- name: "Installing the MySQL repository signing key"
  ansible.builtin.command: gpg --batch --yes --dearmor -o /usr/share/keyrings/mysql-apt-config.gpg /tmp/mysql-signing-key.asc
  changed_when: true

- name: "Updating apt cache"
  ansible.builtin.apt:
    update_cache: true

- name: "Ensuring MySQL Python libraries are installed"
  ansible.builtin.apt:
    name: "{{ mysql_python_package_debian }}"
    state: present

# No debconf root-password preseed here, deliberately: installing the server
# without a password leaves root on auth_socket, which is what lets the
# secure-installation tasks talk to MySQL over the root socket before the
# password is set via ALTER USER and persisted to /root/.my.cnf. (The old
# preseed task never ran anyway — its "creates: my.cnf" guard was always
# satisfied by mariadb-common, pulled in by python3-mysqldb above.)

- name: "Ensuring MySQL packages are installed"
  ansible.builtin.apt:
    name: "{{ __mysql_packages }}"
    state: present
    policy_rc_d: 101
    update_cache: true
    force_apt_get: true
    dpkg_options: "force-confdef,force-confold"
  environment:
    DEBIAN_FRONTEND: noninteractive
  register: deb_mysql_install_packages

# Because MySQL starts as part of the install process, we need to stop
# mysql and remove the logfiles in case the user set a custom log file size.
- name: "Ensuring MySQL is stopped after initial install"
  ansible.builtin.service:
    name: "{{ mysql_daemon }}"
    state: stopped

- name: "Deleting innodb log files created by apt package after initial install"
  ansible.builtin.file:
    path: "{{ mysql_datadir }}/{{ item }}"
    state: absent
  with_items:
    - ib_logfile0
    - ib_logfile1

- name: "Configuring MySQL to allow remote connections"
  ansible.builtin.lineinfile:
    path: /etc/mysql/mysql.conf.d/mysqld.cnf
    regexp: "^bind-address\\s+"
    line: "bind-address = 0.0.0.0"
    state: present
  notify: Restart mysql
