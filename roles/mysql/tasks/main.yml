---
- name: "Allowing loading of variables without running task"
  when: run_tasks
  block:
    - name: "Including variable configuration tasks"
      ansible.builtin.include_tasks: variables.yml

    - name: "Setting up MySQL on RedHat"
      ansible.builtin.include_tasks: setup-RedHat.yml
      when: ansible_os_family == 'RedHat'

    - name: "Setting up MySQL on Debian"
      ansible.builtin.include_tasks: setup-Debian.yml
      when: ansible_os_family == 'Debian'

    - name: "Setting up MySQL on Archlinux"
      ansible.builtin.include_tasks: setup-Archlinux.yml
      when: ansible_os_family == 'ArchLinux'

    - name: "Checking if MySQL packages were installed"
      ansible.builtin.set_fact:
        mysql_install_packages: "{{ (rh_mysql_install_packages is defined and rh_mysql_install_packages.changed) or (deb_mysql_install_packages is defined and deb_mysql_install_packages.changed) or (arch_mysql_install_packages
          is defined and arch_mysql_install_packages.changed) }}"

    - name: "Including MySQL configuration tasks"
      ansible.builtin.include_tasks: configure.yml

    - name: "Including MySQL secure-installation tasks"
      ansible.builtin.include_tasks: secure-installation.yml

    - name: "Including MySQL database tasks"
      ansible.builtin.include_tasks: databases.yml

    - name: "Including MySQL user tasks"
      ansible.builtin.include_tasks: users.yml

    - name: "Including MySQL replication tasks"
      ansible.builtin.include_tasks: replication.yml
