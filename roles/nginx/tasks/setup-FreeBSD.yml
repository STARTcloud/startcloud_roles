---
- name: "Updating pkg cache"
  ansible.builtin.command: pkg update -f
  changed_when: true
  environment:
    ASSUME_ALWAYS_YES: "yes"

- name: "Ensuring nginx is installed"
  community.general.pkgng:
    name: "{{ nginx_package_name }}"
    state: present

- name: "Creating logs directory"
  ansible.builtin.file:
    path: /var/log/nginx
    state: directory
    mode: "0755"
