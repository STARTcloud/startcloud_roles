---
- name: "Ensuring dirmngr is installed (gnupg dependency)"
  ansible.builtin.apt:
    name: dirmngr
    state: present

- name: "Adding PPA for Nginx (if configured)"
  ansible.builtin.apt_repository:
    repo: "ppa:nginx/{{ nginx_ppa_version }}"
    state: present
    update_cache: true
  notify: Remove nginx for PPA reinstall
  when: nginx_ppa_use | bool

- name: "Flushing handlers to reinstall nginx from the PPA"
  ansible.builtin.meta: flush_handlers
