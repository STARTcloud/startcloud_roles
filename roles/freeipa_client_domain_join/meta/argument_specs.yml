---
argument_specs:
  main:
    short_description: Install the FreeIPA client packages and configure the Firefox trust store
    description:
      - Installs the FreeIPA client packages and supporting tooling used to join a host to a FreeIPA domain.
      - Repoints the Firefox libnssckbi.so library at the system p11-kit trust store so Firefox trusts the domain CA.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
