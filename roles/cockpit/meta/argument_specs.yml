---
argument_specs:
  main:
    short_description: Install and enable the Cockpit web console
    description:
      - Installs the Cockpit package via the OS package manager and enables the cockpit.socket service.
      - Optionally clears the Cockpit MOTD banner files.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      cockpit_enabled:
        type: bool
        default: true
        description: When true, enables and starts the cockpit.socket service.
      cockpit_motd:
        type: bool
        default: false
        description: When false, clears the Cockpit MOTD/issue banner files it drops into /etc.
