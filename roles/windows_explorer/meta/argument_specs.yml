---
argument_specs:
  main:
    short_description: Configure Windows Explorer visibility settings
    description:
      - Sets Windows Explorer registry values controlling whether hidden and system/super-hidden files are shown.
    author: Mark Gilbert
    options:
      run_tasks:
        type: bool
        default: true
        description: Master gate — when false the role loads its vars but runs no tasks.
      show_hidden_files:
        type: bool
        default: true
        description: When true, sets the Hidden registry value so Explorer shows hidden files and folders.
      show_super_hidden_files:
        type: bool
        default: false
        description: When true, sets the ShowSuperHidden registry value so Explorer shows protected system files.
